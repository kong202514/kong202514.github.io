  <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Studio Ultimate - 50 Templates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #0f0f0f;
            color: #e5e5e5;
            overflow: hidden;
        }

        .sidebar {
            background-color: #1a1a1a;
            border-right: 1px solid #333;
            width: 320px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .template-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 800;
            color: #ff6b00;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 20px 10px 10px 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #2a2a2a;
        }

        .template-btn {
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
            color: #aaa;
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }

        .template-btn:hover {
            background-color: #2d2d2d;
            color: #fff;
        }

        .template-btn i {
            margin-right: 10px;
            width: 16px;
            text-align: center;
            font-size: 12px;
        }

        .article-list-container {
            border-top: 1px solid #333;
            background: #141414;
            height: 250px;
            display: flex;
            flex-direction: column;
        }

        .article-item {
            padding: 10px 15px;
            font-size: 13px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #999;
            transition: 0.2s;
        }

        .article-item:hover { background: #222; color: #fff; }
        .article-item.active { background: #2a2a2a; color: #ff6b00; border-left: 3px solid #ff6b00; }

        .delete-btn {
            color: #444;
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .delete-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .main-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .editor-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
        }

        textarea#mainContent {
            width: 100%;
            max-width: 850px;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 18px;
            line-height: 1.8;
            resize: none;
        }

        .top-nav {
            background-color: #1a1a1a;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid #333;
        }

        .status-pill { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #333; color: #888; }
        .status-pill.saving { color: #ff6b00; }
        .status-pill.saved { color: #22c55e; }

        .title-input-minimal {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            font-size: 14px;
            padding: 5px 0;
            width: 250px;
            outline: none;
        }

        .title-input-minimal:focus {
            border-bottom-color: #ff6b00;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>

    <div class="main-editor">

            <textarea id="mainContent" placeholder="เริ่มเขียนบทความของคุณ... ทุกการพิมพ์จะบันทึกอัตโนมัติลง Cloud"></textarea>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, deleteDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config (ถอด Authentication ออก)
        const firebaseConfig = {
            apiKey: "AIzaSyDzxn9g-abdHR1Q8lQ_FqsQlhQo0frR11A",
            authDomain: "job-3-d6a57.firebaseapp.com",
            projectId: "job-3-d6a57",
            storageBucket: "job-3-d6a57.firebasestorage.app",
            messagingSenderId: "496444264677",
            appId: "1:496444264677:web:5a39734199e2932113440c"
        };

        const appId = 'article-studio-ultimate'; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ใช้ Guest ID คงที่แทน User ID จาก Auth
        const guestId = "public_user"; 
        let currentDocId = null;
        let saveTimeout = null;

        const updateStatus = (status) => {
            const el = document.getElementById('cloudStatus');
            if(status === 'saving') el.innerHTML = '<i class="fas fa-sync fa-spin mr-1"></i> กำลังบันทึก...';
            else if(status === 'saved') el.innerHTML = '<i class="fas fa-check mr-1 text-green-500"></i> บันทึกแล้ว';
            else el.innerHTML = '<i class="fas fa-cloud mr-1 text-blue-400"></i> พร้อมใช้งาน';
        };

        // Real-time Sync (ไม่ต้องรอ Auth)
        const articlesRef = collection(db, 'artifacts', appId, 'users', guestId, 'articles');
        const q = query(articlesRef, orderBy('updatedAt', 'desc'));

        onSnapshot(q, (snap) => {
            const list = document.getElementById('recentArticles');
            list.innerHTML = '';
            
            if (snap.empty) {
                list.innerHTML = '<div class="text-[10px] text-gray-700 text-center py-2 italic">ไม่มีบทความล่าสุด</div>';
                return;
            }

            snap.docs.forEach(docSnap => {
                const data = docSnap.data();
                const id = docSnap.id;
                const item = document.createElement('div');
                item.className = `article-item group ${currentDocId === id ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="truncate flex-1 pr-2" onclick="window.loadArticleById('${id}', ${JSON.stringify(data).replace(/"/g, '&quot;')})">
                        ${data.title || 'ไม่มีชื่อเรื่อง'}
                    </span>
                    <button onclick="window.deleteArticle(event, '${id}')" class="delete-btn opacity-0 group-hover:opacity-100">
                        <i class="fas fa-trash-alt text-[11px]"></i>
                    </button>
                `;
                list.appendChild(item);
            });
        }, (err) => {
            console.error("Firestore Error:", err);
            // หากเกิด Permission Denied ให้ตรวจสอบ Firestore Rules ใน Console
        });

        window.loadArticleById = (id, data) => {
            currentDocId = id;
            document.getElementById('mainTitle').value = data.title || '';
            document.getElementById('mainContent').value = data.content || '';
            updateStatus('saved');
        };

        window.deleteArticle = async (e, id) => {
            e.stopPropagation();
            if(confirm('ยืนยันการลบบทความนี้ถาวร?')) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', guestId, 'articles', id));
                    if(currentDocId === id) window.createNewArticle();
                } catch(err) { console.error("Delete error:", err); }
            }
        };

        window.createNewArticle = () => {
            currentDocId = null;
            document.getElementById('mainTitle').value = '';
            document.getElementById('mainContent').value = '';
            updateStatus('ready');
            document.getElementById('mainContent').focus();
        };

        const autoSaveCloud = () => {
            updateStatus('saving');
            clearTimeout(saveTimeout);
            
            saveTimeout = setTimeout(async () => {
                const titleVal = document.getElementById('mainTitle').value.trim();
                const contentVal = document.getElementById('mainContent').value.trim();
                
                if(!titleVal && !contentVal) {
                    updateStatus('ready');
                    return;
                }

                const data = {
                    title: titleVal || 'ไม่มีชื่อเรื่อง',
                    content: contentVal,
                    updatedAt: serverTimestamp()
                };

                try {
                    if(currentDocId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', guestId, 'articles', currentDocId), data);
                    } else {
                        const res = await addDoc(collection(db, 'artifacts', appId, 'users', guestId, 'articles'), data);
                        currentDocId = res.id;
                    }
                    updateStatus('saved');
                } catch(e) { 
                    console.error("Save error:", e);
                    updateStatus('ready');
                }
            }, 1000);
        };

        document.getElementById('mainContent').addEventListener('input', autoSaveCloud);
        document.getElementById('mainTitle').addEventListener('input', autoSaveCloud);
    </script>

    <script>
        function insertText(text) {
            const tx = document.getElementById('mainContent');
            const start = tx.selectionStart;
            tx.value = tx.value.substring(0, start) + text + "\n\n" + tx.value.substring(tx.selectionEnd);
            tx.dispatchEvent(new Event('input')); 
            tx.focus();
        }

        function copyContent() {
            const content = document.getElementById('mainContent').value;
            if(!content) return;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.querySelector('button[onclick="copyContent()"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-2"></i> คัดลอกสำเร็จ!';
                btn.classList.replace('bg-orange-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-600', 'bg-orange-600');
                }, 2000);
            });
        }

        function clearAll() {
            if(confirm('ล้างหน้าจอเพื่อเขียนใหม่? (ข้อมูลใน Cloud ไม่หาย)')) {
                window.createNewArticle();
            }
        }
    </script>
</body>
