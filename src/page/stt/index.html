 !DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>คลังวัตถุดิบ - Kitchen Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <nav class="bg-slate-800 text-white p-4 flex gap-4">
        <a href="index.html" class="font-bold border-b-2">คลังวัตถุดิบ</a>
        <a href="withdraw.html">เบิกสินค้า</a>
        <a href="menu-list.html">รายการเมนู</a>
        <a href="admin.html">เพิ่มสินค้า/ตั้งค่า</a>
        <a href="history.html">ประวัติรายการ</a>
    </nav>

    <div class="p-8 max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">📦 วัตถุดิบในคลังปัจจุบัน</h1>
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-4">ชื่อวัตถุดิบ</th>
                        <th class="p-4 text-center">คงเหลือ</th>
                        <th class="p-4">หน่วย</th>
                        <th class="p-4">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        onSnapshot(collection(db, "ingredients"), (snap) => {
            const list = document.getElementById('inventory-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isLow = d.quantity < 5;
                list.innerHTML += `
                    <tr class="border-b ${isLow ? 'bg-red-50' : ''}">
                        <td class="p-4 font-medium">${d.name}</td>
                        <td class="p-4 text-center font-bold">${d.quantity}</td>
                        <td class="p-4 text-gray-500">${d.unit}</td>
                        <td class="p-4"><span class="${isLow ? 'text-red-600 font-bold' : 'text-green-600'}">${isLow ? 'ใกล้หมด!' : 'ปกติ'}</span></td>
                    </tr>`;
            });
        });
    </script>
</body>

</html>
