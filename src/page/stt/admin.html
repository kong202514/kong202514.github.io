<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>เพิ่มสินค้า - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <div class="p-8 max-w-lg mx-auto bg-white mt-10 rounded-xl shadow border-t-4 border-green-500">
        <h2 class="text-xl font-bold mb-4 text-green-600">📥 เพิ่มสินค้า/รับเข้าคลัง</h2>
        <input type="text" id="name" placeholder="ชื่อวัตถุดิบ" class="w-full p-2 border rounded mb-2">
        <input type="number" id="qty" placeholder="จำนวนที่รับเข้า" class="w-full p-2 border rounded mb-2">
        <input type="text" id="unit" placeholder="หน่วย (เช่น กก.)" class="w-full p-2 border rounded mb-4">
        <button id="add-btn" class="w-full bg-green-600 text-white py-2 rounded font-bold">บันทึกรับเข้า</button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        document.getElementById('add-btn').onclick = async () => {
            const n = document.getElementById('name').value;
            const q = parseFloat(document.getElementById('qty').value);
            const u = document.getElementById('unit').value;

            await addDoc(collection(db, "ingredients"), { name: n, quantity: q, unit: u });
            await addDoc(collection(db, "transactions"), {
                ingredientName: n,
                type: 'in',
                amount: q,
                timestamp: serverTimestamp()
            });
            alert("เพิ่มสินค้าเข้าคลังแล้ว");
        };
    </script>
</body>

</html>
