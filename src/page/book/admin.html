 
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Book Editor - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f1f5f9;
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #334155;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-dark);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .search-bar:focus {
            border-color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: #94a3b8;
            padding: 15px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid var(--border);
        }

        .status {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .pub {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .drf {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-del:hover {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            margin-right: 8px;
        }

        /* --- Full Screen Editor Overlay --- */
        #editor {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
        }

        .editor-container {
            display: flex;
            height: 100vh;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #0b1120;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .pages-list {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 20px;
        }

        .page-item {
            padding: 15px;
            background: var(--card-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .page-item:hover {
            border-color: var(--accent);
        }

        .page-item.active {
            background: var(--accent);
            color: #000;
        }

        .page-item small:hover {
            color: var(--danger);
        }

        /* --- Main Content Area --- */
        .main-editor {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            background: var(--bg-dark);
        }

        .writing-area {
            flex-grow: 1;
            background: var(--card-dark);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex-grow: 1;
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.25rem;
            line-height: 1.8;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .auto-save-tag {
            font-size: 0.85rem;
            color: #64748b;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>📚 Book Manager</h1>
            <button class="btn btn-add" onclick="addNewBook()">+ เขียนเล่มใหม่</button>
        </header>
        <input type="text" class="search-bar" id="search" placeholder="🔍 ค้นหาตามชื่อหนังสือ..." onkeyup="doSearch()">
        <table>
            <thead>
                <tr>
                    <th>ชื่อหนังสือ</th>
                    <th>สถานะ</th>
                    <th style="text-align: right;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <div id="editor">
        <div class="editor-container">
            <div class="sidebar">
                <h3 style="margin: 0;">📑 หน้าทั้งหมด</h3>
                <button class="btn btn-add" style="width: 100%; margin-top: 15px;" onclick="addBlankPage()">+
                    เพิ่มหน้าใหม่</button>
                <div class="pages-list" id="pages-list"></div>
                <button class="btn btn-del" style="width: 100%;" onclick="closeEdit()">✕ ปิด</button>
            </div>

            <div class="main-editor">
                <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h2 id="edit-title" style="margin:0">ชื่อหนังสือ</h2>
                        <span id="save-status" class="auto-save-tag">ไม่ได้เลือกหน้า</span>
                    </div>
                </div>
                <div id="writing-area-container" class="writing-area">
                    <div class="empty-state">เลือกหน้าจาก Sidebar เพื่อเริ่มเขียน</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQiXHPEMP8vWV_MyfdITuGRkNZyHRTJRc",
            authDomain: "project-3463735746903079568.firebaseapp.com",
            projectId: "project-3463735746903079568",
            storageBucket: "project-3463735746903079568.firebasestorage.app",
            messagingSenderId: "691755634120",
            appId: "1:691755634120:web:4105342eb7d035dcac04fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let books = [];
        let activeBookId = null;
        let activePageId = null;
        let allPages = [];
        let saveTimeout = null;
        let unsubscribePages = null;

        // --- Books List ---
        onSnapshot(query(collection(db, "my_books"), orderBy("createdAt", "desc")), (snap) => {
            books = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderBooks(books);
        });

        function renderBooks(data) {
            document.getElementById('list').innerHTML = data.map(b => `
                <tr>
                    <td><strong>${b.title}</strong></td>
                    <td><span class="status ${b.status === 'published' ? 'pub' : 'drf'}">${b.status === 'published' ? 'เผยแพร่' : 'แบบร่าง'}</span></td>
                    <td style="text-align: right;">
                        <button class="btn btn-edit" onclick="openEdit('${b.id}', '${b.title}')">แก้ไข</button>
                        <button class="btn btn-del" onclick="delBook('${b.id}')">ลบ</button>
                    </td>
                </tr>
            `).join('');
        }

        window.addNewBook = async () => {
            const t = prompt("ชื่อหนังสือ:");
            if (t) await addDoc(collection(db, "my_books"), { title: t, status: 'draft', createdAt: serverTimestamp() });
        };

        window.delBook = async (id) => {
            if (confirm("ลบหนังสือเล่มนี้?")) await deleteDoc(doc(db, "my_books", id));
        };

        // --- Editor Logic (Fixed Jumping) ---
        window.openEdit = (id, title) => {
            activeBookId = id;
            activePageId = null;
            document.getElementById('edit-title').innerText = title;
            document.getElementById('editor').style.display = 'block';
            document.body.style.overflow = 'hidden';

            const q = query(collection(db, `my_books/${id}/pages`), orderBy("createdAt", "asc"));
            unsubscribePages = onSnapshot(q, (snap) => {
                allPages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderSidebar();
            });
        };

        function renderSidebar() {
            const list = document.getElementById('pages-list');
            list.innerHTML = allPages.map((p, i) => `
                <div class="page-item ${activePageId === p.id ? 'active' : ''}" onclick="selectPage('${p.id}')">
                    <span>หน้าที่ ${i + 1}</span>
                    <small onclick="event.stopPropagation(); delPage('${p.id}')">ลบ</small>
                </div>
            `).join('');
        }

        window.selectPage = (pid) => {
            activePageId = pid;
            renderSidebar();

            const page = allPages.find(p => p.id === pid);
            const container = document.getElementById('writing-area-container');

            // วาด Textarea ใหม่แค่ตอนเปลี่ยนหน้าเท่านั้น
            container.innerHTML = `
                <div style="margin-bottom:10px; color:var(--accent);">กำลังแก้ไขหน้าที่ ${allPages.indexOf(page) + 1}</div>
                <textarea id="main-textarea" placeholder="เริ่มเขียน...">${page.content || ''}</textarea>
            `;

            const area = document.getElementById('main-textarea');
            area.focus();

            // ใช้ Event Listener แทนการใส่ oninput ใน HTML เพื่อความนิ่ง
            area.addEventListener('input', (e) => {
                autoSave(pid, e.target.value);
            });
        };

        window.autoSave = (pid, content) => {
            const status = document.getElementById('save-status');
            status.innerText = "กำลังบันทึก...";
            status.style.color = "#fbbf24";

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try {
                    await updateDoc(doc(db, `my_books/${activeBookId}/pages`, pid), { content: content });
                    status.innerText = "บันทึกแล้ว ✅";
                    status.style.color = "#4ade80";
                } catch (e) { console.error(e); }
            }, 800); // บันทึกหลังจากหยุดพิมพ์ 0.8 วินาที
        };

        window.addBlankPage = async () => {
            const docRef = await addDoc(collection(db, `my_books/${activeBookId}/pages`), {
                content: "",
                createdAt: Date.now()
            });
            // เมื่อสร้างหน้าใหม่ ให้ทำการ Select หน้าใหม่นั้นทันที
            setTimeout(() => selectPage(docRef.id), 500);
        };

        window.delPage = async (pid) => {
            if (confirm("ลบหน้านี้?")) {
                await deleteDoc(doc(db, `my_books/${activeBookId}/pages`, pid));
                if (activePageId === pid) {
                    activePageId = null;
                    document.getElementById('writing-area-container').innerHTML = `<div class="empty-state">เลือกหน้าจาก Sidebar เพื่อเริ่มเขียน</div>`;
                }
            }
        };

        window.closeEdit = () => {
            if (unsubscribePages) unsubscribePages();
            document.getElementById('editor').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        window.doSearch = () => {
            const q = document.getElementById('search').value.toLowerCase();
            renderBooks(books.filter(b => b.title.toLowerCase().includes(q)));
        };
    </script>
</body>

</html>
