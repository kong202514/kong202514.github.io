<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Book Manager - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f1f5f9;
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #334155;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-dark);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Search Bar Dark Style */
        .search-bar {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: #94a3b8;
            padding: 15px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid var(--border);
        }

        /* Status Tags */
        .status {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .pub {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .drf {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-add {
            background: var(--accent);
            color: #000;
        }

        .btn-add:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-del:hover {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            margin-right: 8px;
        }

        /* Modern Editor Overlay */
        #editor {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 1000;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .editor-header {
            max-width: 900px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-grid {
            max-width: 900px;
            margin: auto;
            display: grid;
            gap: 25px;
        }

        .page-card {
            background: var(--card-dark);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            position: relative;
        }

        .page-num {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .auto-save-tag {
            font-size: 0.8rem;
            color: #64748b;
            margin-left: 10px;
        }

        .action-area {
            text-align: right;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1 style="font-size: 1.5rem;">📚 Book Management <small
                    style="font-weight: 400; color: #64748b;">Admin</small></h1>
            <button class="btn btn-add" onclick="addNewBook()">+ เขียนเล่มใหม่</button>
        </header>

        <input type="text" class="search-bar" id="search" placeholder="🔍 ค้นหาตามชื่อหนังสือ..." onkeyup="doSearch()">

        <table>
            <thead>
                <tr>
                    <th>ชื่อหนังสือ</th>
                    <th>สถานะ</th>
                    <th style="text-align: right;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <div id="editor">
        <div class="editor-header">
            <div>
                <h2 id="edit-title" style="margin:0">กำลังแก้ไข</h2>
                <span id="save-status" class="auto-save-tag">ระบบจะบันทึกอัตโนมัติเมื่อพิมพ์...</span>
            </div>
            <button class="btn btn-del" onclick="closeEdit()">✕ ปิดหน้าต่าง</button>
        </div>

        <div id="pages-area" class="page-grid"></div>

        <div style="max-width: 900px; margin: 40px auto; text-align: center;">
            <button class="btn btn-add" style="width: 100%; padding: 20px;" onclick="addBlankPage()">+
                เพิ่มหน้ากระดาษใหม่</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase Config (คงไว้ตามเดิมของคุณ)
        const firebaseConfig = {
            apiKey: "AIzaSyCQiXHPEMP8vWV_MyfdITuGRkNZyHRTJRc",
            authDomain: "project-3463735746903079568.firebaseapp.com",
            projectId: "project-3463735746903079568",
            storageBucket: "project-3463735746903079568.firebasestorage.app",
            messagingSenderId: "691755634120",
            appId: "1:691755634120:web:4105342eb7d035dcac04fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let books = [];
        let activeId = null;
        let saveTimeout = null;

        // Load & Render Data
        onSnapshot(query(collection(db, "my_books"), orderBy("createdAt", "desc")), (snap) => {
            books = [];
            snap.forEach(d => books.push({ id: d.id, ...d.data() }));
            render(books);
        });

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(b => {
                list.innerHTML += `
                <tr>
                    <td><strong style="font-size:1.1rem">${b.title}</strong></td>
                    <td><span class="status ${b.status === 'published' ? 'pub' : 'drf'}">${b.status === 'published' ? 'เผยแพร่แล้ว' : 'แบบร่าง'}</span></td>
                    <td style="text-align: right;">
                        <button class="btn btn-edit" onclick="openEdit('${b.id}', '${b.title}')">แก้ไขเนื้อหา</button>
                        <button class="btn" style="background:rgba(255,255,255,0.1);color:#ccc" onclick="flipStatus('${b.id}','${b.status}')">สลับสถานะ</button>
                        <button class="btn btn-del" onclick="delBook('${b.id}')">ลบ</button>
                    </td>
                </tr>`;
            });
        }

        // Logic Functions
        window.doSearch = () => {
            const q = document.getElementById('search').value.toLowerCase();
            render(books.filter(b => b.title.toLowerCase().includes(q)));
        };

        window.addNewBook = async () => {
            const t = prompt("กรุณาระบุชื่อหนังสือเล่มใหม่:");
            if (t) await addDoc(collection(db, "my_books"), { title: t, status: 'draft', createdAt: serverTimestamp() });
        };

        window.flipStatus = async (id, s) => {
            await updateDoc(doc(db, "my_books", id), { status: s === 'published' ? 'draft' : 'published' });
        };

        window.delBook = async (id) => {
            if (confirm("ยืนยันการลบหนังสือเล่มนี้? ข้อมูลจะหายไปถาวร")) await deleteDoc(doc(db, "my_books", id));
        };

        // Editor with Auto-Save
        window.openEdit = (id, title) => {
            activeId = id;
            document.getElementById('edit-title').innerText = title;
            document.getElementById('editor').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Lock Scroll
            loadPages(id);
        };

        window.closeEdit = () => {
            document.getElementById('editor').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        async function loadPages(id) {
            const q = query(collection(db, `my_books/${id}/pages`), orderBy("createdAt", "asc"));
            const snap = await getDocs(q);
            const area = document.getElementById('pages-area');
            area.innerHTML = '';
            snap.forEach((d, i) => {
                area.innerHTML += `
                <div class="page-card">
                    <span class="page-num">หน้าที่ ${i + 1}</span>
                    <textarea 
                        id="t-${d.id}" 
                        placeholder="เริ่มเขียนเนื้อหาของคุณตรงนี้..."
                        oninput="autoSave('${d.id}')"
                    >${d.data().content || ''}</textarea>
                    <div class="action-area">
                        <button class="btn btn-del" style="font-size:0.7rem; padding: 5px 10px;" onclick="delP('${d.id}')">ลบหน้านี้</button>
                    </div>
                </div>`;
            });
        }

        // ระบบ Auto Save
        window.autoSave = (pid) => {
            const statusTag = document.getElementById('save-status');
            statusTag.innerText = "กำลังบันทึก...";
            statusTag.style.color = "#fbbf24";

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                const content = document.getElementById(`t-${pid}`).value;
                try {
                    await updateDoc(doc(db, `my_books/${activeId}/pages`, pid), { content: content });
                    statusTag.innerText = "บันทึกเรียบร้อยแล้ว";
                    statusTag.style.color = "#4ade80";
                } catch (e) {
                    statusTag.innerText = "เกิดข้อผิดพลาดในการบันทึก!";
                    statusTag.style.color = "#ef4444";
                }
            }, 1000); // บันทึกหลังจากหยุดพิมพ์ 1 วินาที
        };

        window.addBlankPage = async () => {
            await addDoc(collection(db, `my_books/${activeId}/pages`), { content: "", createdAt: Date.now() });
            loadPages(activeId);
        };

        window.delP = async (pid) => {
            if (confirm("ลบหน้ากระดาษนี้?")) {
                await deleteDoc(doc(db, `my_books/${activeId}/pages`, pid));
                loadPages(activeId);
            }
        };
    </script>
</body>

</html>
