 <!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Digital Library - Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --paper: #fdfaf0;
            --accent: #fbbf24;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            overflow: hidden;
        }

        /* --- Library Section --- */
        #library-view {
            height: 100vh;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .book-item {
            background: #1e293b;
            color: white;
            padding: 40px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .book-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        /* --- Reader View --- */
        #reader-view {
            display: none;
            height: 100vh;
            width: 100vw;
            background: #020617;
            position: fixed;
            top: 0;
            left: 0;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .book-viewport {
            position: relative;
            width: 450px;
            height: 80%;
            perspective: 2000px;
        }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            transform-style: preserve-3d;
            transition: transform 0.6s ease-in-out;
            transform-origin: left;
        }

        .paper.active {
            display: block;
            z-index: 10;
        }

        .front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper);
            backface-visibility: hidden;
            border-radius: 0 10px 10px 0;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5);
        }

        .content {
            flex: 1;
            padding: 40px;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #1a1a1a;
            overflow-y: auto !important;
            white-space: pre-wrap;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) #eee;
        }

        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .page-num {
            text-align: center;
            padding: 10px;
            background: #eee;
            font-weight: bold;
            color: #333;
        }

        /* Controls */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10001;
        }

        .footer-controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 20px;
            z-index: 10001;
        }

        .btn-ui {
            background: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: 0.2s;
        }

        .btn-ui:hover {
            background: var(--accent);
        }

        #hl-tool {
            position: fixed;
            display: none;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 10005;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #hl-tool:hover {
            background: #059669;
        }

        /* คลาสสไตล์สำหรับข้อความที่ถูกไฮไลท์ */
        .highlight {
            background: rgba(251, 191, 36, 0.6) !important;
            display: inline;
        }
    </style>
</head>

<body>

    <div id="library-view">
        <h1 style="color:var(--accent)">🏛️ หอสมุดดิจิทัล</h1>
        <div class="book-grid" id="book-grid"></div>
    </div>

    <div id="reader-view">
        <div class="nav-bar">
            <button class="btn-ui" onclick="backToLibrary()">← กลับคลังหนังสือ</button>
        </div>

        <div class="book-viewport" id="book-container"></div>

        <div class="footer-controls">
            <button class="btn-ui" onclick="changePage(-1)">⬅️ หน้าก่อนหน้า</button>
            <button class="btn-ui" onclick="changePage(1)">หน้าถัดไป ➡️</button>
        </div>

        <button id="hl-tool">🖍️ ไฮไลท์</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, onSnapshot, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQiXHPEMP8vWV_MyfdITuGRkNZyHRTJRc",
            authDomain: "project-3463735746903079568.firebaseapp.com",
            projectId: "project-3463735746903079568",
            storageBucket: "project-3463735746903079568.firebasestorage.app",
            messagingSenderId: "691755634120",
            appId: "1:691755634120:web:4105342eb7d035dcac04fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentPageIdx = 0;
        let pagesData = [];
        let activeBookId = null;

        // ดึงรายชื่อหนังสือที่มีสถานะเป็น published
        onSnapshot(query(collection(db, "my_books"), where("status", "==", "published")), (snap) => {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';
            snap.forEach(d => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `<h3>${d.data().title}</h3>`;
                div.onclick = () => openReader(d.id);
                grid.appendChild(div);
            });
        });

        // เปิดโหมดอ่านหนังสือ
        async function openReader(id) {
            activeBookId = id;
            currentPageIdx = 0;
            document.getElementById('library-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'flex';

            const pSnap = await getDocs(query(collection(db, `my_books/${id}/pages`), orderBy("createdAt", "asc")));
            pagesData = [];
            pSnap.forEach(d => pagesData.push({ id: d.id, content: d.data().content || "" }));

            renderPages();
        }

        // แสดงผลหน้ากระดาษ (แก้ไขให้รองรับ HTML tag ของไฮไลท์)
        function renderPages() {
            const container = document.getElementById('book-container');
            container.innerHTML = '';

            if (pagesData.length === 0) {
                container.innerHTML = '<div style="color:white; text-align:center; padding-top:50px;">ไม่พบเนื้อหาในหนังสือเล่มนี้</div>';
                return;
            }

            pagesData.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = `paper ${index === currentPageIdx ? 'active' : ''}`;
                div.id = `page-${index}`;
                // ใช้การใส่เนื้อหาแบบ HTML เพื่อให้ tag <span> ของไฮไลท์ทำงานได้
                div.innerHTML = `
                    <div class="front">
                        <div class="content" data-id="${p.id}" data-index="${index}">${p.content}</div>
                        <div class="page-num">หน้า ${index + 1}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // ส่งฟังก์ชันไปยัง window scope เพื่อให้ปุ่ม HTML เรียกใช้งานได้
        window.changePage = function(step) {
            const newIdx = currentPageIdx + step;
            if (newIdx >= 0 && newIdx < pagesData.length) {
                document.getElementById(`page-${currentPageIdx}`).classList.remove('active');
                currentPageIdx = newIdx;
                
                const nextElem = document.getElementById(`page-${currentPageIdx}`);
                nextElem.classList.add('active');
                nextElem.querySelector('.content').scrollTop = 0;
            }
        };

        window.backToLibrary = function() {
            document.getElementById('library-view').style.display = 'flex';
            document.getElementById('reader-view').style.display = 'none';
            document.getElementById('hl-tool').style.display = 'none';
        };

        // --- ระบบไฮไลท์ข้อความ ---
        const hlBtn = document.getElementById('hl-tool');
        
        document.addEventListener('mouseup', (e) => {
            const sel = window.getSelection();
            if (sel && sel.toString().trim() && document.getElementById('reader-view').style.display === 'flex') {
                hlBtn.style.display = 'block';
                // เปลี่ยนเป็น fixed positioning เพื่อไม่ให้ปุ่มเพี้ยนเวลาเลื่อนหน้าจอ
                hlBtn.style.left = e.clientX + 'px';
                hlBtn.style.top = (e.clientY - 50) + 'px';
            } else {
                // หน่วงเวลาเล็กน้อยป้องกันปุ่มหายขณะกำลังกดคลิกที่ตัวปุ่มไฮไลท์เอง
                setTimeout(() => { 
                    if (!window.getSelection().toString()) hlBtn.style.display = 'none'; 
                }, 200);
            }
        });

        hlBtn.onclick = async () => {
            const sel = window.getSelection();
            if (!sel.toString().trim()) return;

            const range = sel.getRangeAt(0);
            const contentDiv = range.commonAncestorContainer.parentElement.closest('.content');
            if (!contentDiv) return;

            const span = document.createElement('span');
            span.className = 'highlight';
            
            try {
                range.surroundContents(span);
                const updatedContent = contentDiv.innerHTML;
                const pageId = contentDiv.dataset.id;
                const pageIdx = parseInt(contentDiv.dataset.index);

                // อัปเดตข้อมูลใน Local Array เพื่อไม่ให้สลับหน้าแล้วหาย
                pagesData[pageIdx].content = updatedContent;

                // อัปเดตลง Firestore
                await updateDoc(doc(db, `my_books/${activeBookId}/pages`, pageId), {
                    content: updatedContent
                });
                
                hlBtn.style.display = 'none';
                sel.removeAllRanges(); // ล้างแถบสีฟ้าที่เลือกออกหลังไฮไลท์เสร็จ
            } catch (e) { 
                alert("ไม่สามารถไฮไลท์พื้นที่นี้ได้ข้ามแท็กอื่น (กรุณาเลือกเฉพาะข้อความธรรมดา)"); 
                console.error(e);
            }
        };
    </script>
</body>

</html>
