 !DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Digital Library - Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --paper: #fdfaf0;
            --accent: #fbbf24;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            overflow: hidden;
        }

        /* --- Library Section --- */
        #library-view {
            height: 100vh;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .book-item {
            background: #1e293b;
            color: white;
            padding: 40px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .book-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        /* --- Reader View (The Engine) --- */
        #reader-view {
            display: none;
            height: 100vh;
            width: 100vw;
            background: #020617;
            position: fixed;
            top: 0;
            left: 0;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .book-viewport {
            position: relative;
            width: 450px;
            height: 85%;
            /* ปรับให้พอดีหน้าจอเพื่อการ Scroll */
            perspective: 2000px;
        }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            /* ซ่อนทุกหน้าเป็นพื้นฐาน */
            transform-style: preserve-3d;
            transition: transform 0.6s ease-in-out;
            transform-origin: left;
        }

        /* แสดงเฉพาะหน้าที่กำลังอ่าน (Active) */
        .paper.active {
            display: block;
            z-index: 10;
        }

        .front,
        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper);
            backface-visibility: hidden;
            border-radius: 0 10px 10px 0;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* เนื้อหาที่ลูกกลิ้งเมาส์ต้องทำงาน */
        .content {
            flex: 1;
            padding: 40px;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #1a1a1a;
            overflow-y: auto !important;
            /* บังคับ Scroll */
            white-space: pre-wrap;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) #eee;
        }

        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .page-num {
            text-align: center;
            padding: 10px;
            background: #eee;
            font-weight: bold;
        }

        /* Controls */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10001;
        }

        .footer-controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 20px;
            z-index: 10001;
        }

        .btn-ui {
            background: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .btn-ui:hover {
            background: var(--accent);
        }

        #hl-tool {
            position: absolute;
            display: none;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 10005;
        }

        .highlight {
            background: rgba(251, 191, 36, 0.5);
        }
    </style>
</head>

<body>

    <div id="library-view">
        <h1 style="color:var(--accent)">🏛️ หอสมุดดิจิทัล</h1>
        <div class="book-grid" id="book-grid"></div>
    </div>

    <div id="reader-view">
        <div class="nav-bar">
            <button class="btn-ui" onclick="location.reload()">← กลับคลังหนังสือ</button>
        </div>

        <div class="book-viewport" id="book-container">
        </div>

        <div class="footer-controls">
            <button class="btn-ui" onclick="changePage(-1)">⬅️ หน้าก่อนหน้า</button>
            <button class="btn-ui" onclick="changePage(1)">หน้าถัดไป ➡️</button>
        </div>

        <button id="hl-tool">🖍️ ไฮไลท์</button>
    </div>

    <script type="module" src="">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, onSnapshot, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQiXHPEMP8vWV_MyfdITuGRkNZyHRTJRc",
            authDomain: "project-3463735746903079568.firebaseapp.com",
            projectId: "project-3463735746903079568",
            storageBucket: "project-3463735746903079568.firebasestorage.app",
            messagingSenderId: "691755634120",
            appId: "1:691755634120:web:4105342eb7d035dcac04fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentPageIdx = 0;
        let pagesData = [];
        let activeBookId = null;

        onSnapshot(query(collection(db, "my_books"), where("status", "==", "published")), (snap) => {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';
            snap.forEach(d => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `<h3>${d.data().title}</h3>`;
                div.onclick = () => openReader(d.id);
                grid.appendChild(div);
            });
        });

        async function openReader(id) {
            activeBookId = id;
            currentPageIdx = 0;
            document.getElementById('library-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'flex';

            const pSnap = await getDocs(query(collection(db, `my_books/${id}/pages`), orderBy("createdAt", "asc")));
            pagesData = [];
            pSnap.forEach(d => pagesData.push({ id: d.id, content: d.data().content || "" }));

            renderPages();
        }

        function renderPages() {
            const container = document.getElementById('book-container');
            container.innerHTML = '';

            // เราจะสร้าง Element หน้ากระดาษทีละหน้า (Single Page System เพื่อการ Scroll)
            pagesData.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = `paper ${index === currentPageIdx ? 'active' : ''}`;
                div.id = `page-${index}`;
                div.innerHTML = `
                <div class="front">
                    <div class="content" data-id="${p.id}">${p.content}</div>
                    <div class="page-num">หน้า ${index + 1}</div>
                </div>
            `;
                container.appendChild(div);
            });
        }

        window.changePage = (step) => {
            const newIdx = currentPageIdx + step;
            if (newIdx >= 0 && newIdx < pagesData.length) {
                // ซ่อนหน้าเก่า
                document.getElementById(`page-${currentPageIdx}`).classList.remove('active');
                // อัปเดต Index
                currentPageIdx = newIdx;
                // แสดงหน้าใหม่
                const nextElem = document.getElementById(`page-${currentPageIdx}`);
                nextElem.classList.add('active');
                // รีเซ็ตตำแหน่ง Scroll ของหน้าใหม่ให้ไปอยู่บนสุด
                nextElem.querySelector('.content').scrollTop = 0;
            }
        };

        // --- ระบบไฮไลท์ ---
        const hlBtn = document.getElementById('hl-tool');
        document.addEventListener('mouseup', (e) => {
            const sel = window.getSelection();
            if (sel.toString().trim()) {
                hlBtn.style.display = 'block';
                hlBtn.style.left = e.pageX + 'px';
                hlBtn.style.top = (e.pageY - 60) + 'px';
            } else {
                setTimeout(() => { if (!window.getSelection().toString()) hlBtn.style.display = 'none'; }, 200);
            }
        });

        hlBtn.onclick = async () => {
            const sel = window.getSelection();
            const range = sel.getRangeAt(0);
            const contentDiv = range.commonAncestorContainer.parentElement.closest('.content');
            if (!contentDiv) return;

            const span = document.createElement('span');
            span.className = 'highlight';
            try {
                range.surroundContents(span);
                await updateDoc(doc(db, `my_books/${activeBookId}/pages`, contentDiv.dataset.id), {
                    content: contentDiv.innerHTML
                });
                hlBtn.style.display = 'none';
            } catch (e) { alert("ไฮไลท์ผิดพลาด"); }
        };
    </script>
</body>

</html>
