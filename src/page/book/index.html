 !DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Digital Library - Fullscreen Enabled</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --paper: #fcfaf2;
            --accent: #fbbf24;
        }

        body {
            background: var(--bg);
            margin: 0;
            font-family: 'Sarabun', sans-serif;
            overflow-x: hidden;
        }

        /* --- Library Section --- */
        #library-view {
            min-height: 100vh;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .book-item {
            background: white;
            color: #333;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .book-item:hover {
            transform: translateY(-10px);
        }

        /* --- Reader Section --- */
        #reader-view {
            display: none;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle, #1e293b, #0f172a);
            position: fixed;
            top: 0;
            left: 0;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            z-index: 9999;
        }

        /* Book Structure */
        .book {
            position: relative;
            width: 400px;
            height: 600px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            /* สำหรับตอนขยาย */
        }

        /* เมื่อเข้า Fullscreen ให้ขยายสมุด */
        #reader-view:fullscreen .book {
            transform: scale(1.2);
        }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .front,
        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper);
            backface-visibility: hidden;
            border: 1px solid #d1d5db;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        .front {
            border-radius: 0 10px 10px 0;
            z-index: 2;
        }

        .back {
            transform: rotateY(180deg);
            border-radius: 10px 0 0 10px;
            z-index: 1;
        }

        .flipped {
            transform: rotateY(-180deg);
        }

        .content {
            flex: 1;
            padding: 40px;
            font-size: 1.1rem;
            line-height: 1.7;
            overflow-y: auto;
            white-space: pre-wrap;
            user-select: text;
        }

        .page-footer {
            height: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            pointer-events: none;
        }

        .nav-zone {
            position: absolute;
            top: 0;
            width: 50px;
            height: 100%;
            z-index: 100;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.02);
            transition: 0.3s;
        }

        .nav-zone:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .next-zone {
            right: -50px;
            border-radius: 0 10px 10px 0;
        }

        .prev-zone {
            left: 0;
            border-radius: 10px 0 0 10px;
        }

        /* Toolbar */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10000;
        }

        .btn-ui {
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-ui:hover {
            background: var(--accent);
        }

        #hl-tool {
            position: absolute;
            display: none;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 5000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .highlight {
            background: rgba(251, 191, 36, 0.4);
        }

        /* ซ่อนปุ่ม Fullscreen ถ้า Browser ไม่รองรับ */
        :fullscreen-enabled #btn-fs {
            display: flex;
        }
    </style>
</head>

<body>

    <div id="library-view">
        <h1 style="color:var(--accent)">🏛️ หอสมุดดิจิทัล</h1>
        <div class="book-grid" id="book-grid"></div>
    </div>

    <div id="reader-view">
        <div class="nav-bar">
            <button class="btn-ui" onclick="location.reload()">← ออก</button>
            <button class="btn-ui" id="btn-fs" onclick="toggleFullscreen()">🔲 เต็มหน้าจอ</button>
        </div>
        <div class="book" id="book-container"></div>
        <button id="hl-tool">✨ ไฮไลท์ข้อความ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, onSnapshot, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQiXHPEMP8vWV_MyfdITuGRkNZyHRTJRc",
            authDomain: "project-3463735746903079568.firebaseapp.com",
            projectId: "project-3463735746903079568",
            storageBucket: "project-3463735746903079568.firebasestorage.app",
            messagingSenderId: "691755634120",
            appId: "1:691755634120:web:4105342eb7d035dcac04fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeBookId = null;

        // 1. โหลดคลังหนังสือ
        onSnapshot(query(collection(db, "my_books"), where("status", "==", "published")), (snap) => {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';
            snap.forEach(d => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `<b>${d.data().title}</b>`;
                div.onclick = () => openReader(d.id);
                grid.appendChild(div);
            });
        });

        // 2. ระบบ Fullscreen
        window.toggleFullscreen = () => {
            const elem = document.getElementById("reader-view");
            const btn = document.getElementById("btn-fs");

            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
                btn.innerHTML = "🔳 ออกจากเต็มจอ";
            } else {
                document.exitFullscreen();
                btn.innerHTML = "🔲 เต็มหน้าจอ";
            }
        };

        // 3. เปิดหน้าอ่าน
        async function openReader(id) {
            activeBookId = id;
            document.getElementById('library-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'flex';

            const pSnap = await getDocs(query(collection(db, `my_books/${id}/pages`), orderBy("createdAt", "asc")));
            const pages = [];
            pSnap.forEach(d => pages.push({ id: d.id, content: d.data().content || "" }));

            let html = '';
            for (let i = 0; i < pages.length; i += 2) {
                html += `
                <div class="paper" style="z-index: ${pages.length - i}">
                    <div class="nav-zone next-zone" onclick="flip(this.parentElement, 'next', ${i})"></div>
                    <div class="front">
                        <div class="content" data-id="${pages[i].id}">${pages[i].content}</div>
                        <div class="page-footer">${i + 1}</div>
                    </div>
                    <div class="back">
                        <div class="nav-zone prev-zone" onclick="flip(this.parentElement, 'prev', ${i})"></div>
                        <div class="content" data-id="${pages[i + 1]?.id || ''}">${pages[i + 1]?.content || 'จบเล่ม'}</div>
                        <div class="page-footer">${i + 2}</div>
                    </div>
                </div>`;
            }
            document.getElementById('book-container').innerHTML = html;
        }

        // 4. พลิกหน้า
        window.flip = (paper, dir, idx) => {
            if (dir === 'next') {
                paper.classList.add('flipped');
                setTimeout(() => { paper.style.zIndex = idx + 1; }, 500);
            } else {
                paper.classList.remove('flipped');
                const total = document.querySelectorAll('.paper').length;
                setTimeout(() => { paper.style.zIndex = total - idx; }, 500);
            }
        };

        // 5. ไฮไลท์
        const hlBtn = document.getElementById('hl-tool');
        document.addEventListener('mouseup', (e) => {
            const sel = window.getSelection();
            if (sel.toString().trim()) {
                hlBtn.style.display = 'block';
                hlBtn.style.left = e.pageX + 'px';
                hlBtn.style.top = (e.pageY - 60) + 'px';
            } else {
                setTimeout(() => { if (!window.getSelection().toString()) hlBtn.style.display = 'none'; }, 200);
            }
        });

        hlBtn.onclick = async (e) => {
            e.stopPropagation();
            const sel = window.getSelection();
            const range = sel.getRangeAt(0);
            const contentDiv = range.commonAncestorContainer.parentElement.closest('.content');
            if (!contentDiv) return;

            const span = document.createElement('span');
            span.className = 'highlight';
            try {
                range.surroundContents(span);
                await updateDoc(doc(db, `my_books/${activeBookId}/pages`, contentDiv.dataset.id), {
                    content: contentDiv.innerHTML
                });
                hlBtn.style.display = 'none';
                sel.removeAllRanges();
            } catch (err) { alert("กรุณาไฮไลท์เฉพาะในย่อหน้าเดียวกัน"); }
        };
    </script>
</body>

</html>
