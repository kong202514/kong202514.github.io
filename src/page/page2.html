<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT-IDE Extreme View v2.0 - AVIATION THAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Fira+Code:wght@500;700&display=swap');

        :root {
            --cockpit-bg: #0a0c10;
            --panel-bg: #1c2128;
            --safety-orange: #ca7f49;
            --warning-yellow: #facc15;
            --radar-green: #22c55e;
            --editor-font-size: 36px;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--cockpit-bg);
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        #editorTextarea {
            font-size: var(--editor-font-size);
            line-height: 1.7;
            font-weight: 600;
            font-family: 'Kanit', sans-serif;
            background-color: #000000;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            outline: none;
            resize: none;
            padding: 3rem;
            border: 2px solid #333;
        }

        .input-dark {
            background-color: #161b22;
            color: white;
            border: 2px solid #30363d;
            font-size: 18px;
            font-weight: 500;
        }

        .input-dark:focus {
            border-color: var(--safety-orange);
            outline: none;
        }

        .btn-snippet {
            font-size: 16px;
            font-weight: 700;
            color: #94a3b8;
            padding: 12px 16px;
            border-left: 4px solid transparent;
            text-align: left;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 2px;
        }

        .btn-snippet:hover {
            background-color: #30363d;
            color: var(--warning-yellow);
            border-left: 4px solid var(--safety-orange);
        }

        .section-label {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--safety-orange);
            margin-bottom: 8px;
            display: block;
        }

        .flight-card {
            background: var(--panel-bg);
            border: 1px solid #30363d;
            border-top: 4px solid #444;
            transition: all 0.2s;
        }

        .flight-card:hover {
            border-top: 4px solid var(--safety-orange);
            transform: translateY(-2px);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 5px;
        }

        /* Microphone Test Styles - Aviation Theme */
        .mic-test-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #161b22;
            padding: 5px 15px;
            border: 1px solid #30363d;
            border-radius: 4px;
        }

        .meter-bg {
            width: 120px;
            height: 12px;
            background: #000;
            border: 1px solid #444;
            position: relative;
            overflow: hidden;
        }

        #volume-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #facc15, #ef4444);
            transition: width 0.05s ease;
        }

        .mic-btn {
            background: #30363d;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 2px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .mic-btn:hover:not(:disabled) {
            background: var(--safety-orange);
            color: #000;
        }

        .mic-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = (() => {
            var _0x4f2a = [
                "NjIyMjIyMDcxNTcx",
                "eXQtOTBlYjMuZmlyZWJhc2VzdG9yYWdlLmFwcA==",
                "MTo2MjIyMjIwNzE1NzE6d2ViOmFmNzc2MDRmNGY0NWRiOTYwZWVjZTY=",
                "QUl6YVN5QUhkNjBWQU9fX2hwUmxWME5lMG1lRHk3cVJjRWFBbG5V",
                "eXQtOTBlYjM=",
                "eXQtOTBlYjMuZmlyZWJhc2VhcHAuY29t"
            ], _0x1122 = (i) => {
                try {
                    return atob(_0x4f2a[i]);
                } catch (e) {
                    return _0x4f2a[i].split('').reverse().join('');
                }
            }
            return {
                apiKey: _0x1122(3),
                authDomain: _0x1122(5),
                projectId: _0x1122(4),
                storageBucket: _0x1122(1),
                messagingSenderId: _0x1122(0),
                appId: _0x1122(2)
            };
        })();

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentCategoryId = null, currentTopicId = null;

        const templates = {
            // --- 🎯 OPENING & HOOKS (หยุดนิ้วคนดู) ---
            1: "🔥 [Hook - Problem]: คุณเคยเจอปัญหา [ระบุปัญหา] ใช่ไหม?",
            2: "🚀 [Hook - Secret]: สิ่งที่คน 90% พลาดเรื่อง [ชื่อหัวข้อ] คือ...",
            21: "😱 [Hook - Warning]: หยุด! อย่าเพิ่งทำ [กิจกรรม] ถ้ายังไม่ได้ดูคลิปนี้",
            22: "🏆 [Hook - Result]: นี่คือผลลัพธ์หลังผมลอง [เทคนิค] มาแค่ [ระยะเวลา]",
            23: "⏳ [Hook - Time Saver]: วิธีลดเวลาในการ [ทำบางอย่าง] ลง 2 เท่า!",
            31: "🤯 [Hook - Myth Buster]: ความเชื่อผิดๆ เกี่ยวกับ [ชื่อหัวข้อ] ที่คุณต้องรู้",
            32: "💰 [Hook - Value]: วิธีหาเงิน/ประหยัดเงิน [จำนวน] บาท ด้วยสิ่งนี้...",

            // --- 👋 INTRODUCTION (เปิดตัว) ---
            3: "👋 [Intro - Persona]: สวัสดีครับผม [ชื่อ] ยินดีต้อนรับเข้าสู่ช่อง [ชื่อช่อง]",
            4: "📌 [Intro - Topic]: วันนี้เราจะมาเจาะลึกเรื่อง [หัวข้อหลัก]",
            4.3: "---------------------",
            5: "✅ [Point]: ประเด็นที่สำคัญคือ [ชื่อประเด็น] เพราะว่า...",
            24: "💎 [Intro - Value]: สิ่งที่คุณจะได้จากคลิปนี้คือ [ระบุประโยชน์]",
            33: "📜 [Intro - Story]: จุดเริ่มต้นของเรื่องนี้มันเริ่มมาจากที่ผม...",

            // --- 🧠 CONTENT & KNOWLEDGE (เนื้อหาหลัก) ---
            6: "💡 [Trick]: เคล็ดลับที่ผมใช้บ่อยๆ คือ [ระบุทริค]",
            7: "📊 [Data]: จากสถิติพบว่า [ระบุข้อมูลอ้างอิง]",
            8: "⚠️ [Warning]: สิ่งที่ต้องระวังที่สุดคือ [ระบุความเสี่ยง]",
            9: "🔄 [Example]: ลองดูตัวอย่างนี้ครับ [ยกตัวอย่าง]",
            10: "🛠️ [How-to]: ขั้นตอนแรกให้คุณ [Step 1] ต่อด้วย [Step 2]",
            25: "🧠 [Analogy]: เปรียบเรื่องนี้ให้เข้าใจง่ายๆ เหมือนกับ [การเปรียบเทียบ]",
            26: "🧪 [Case Study]: เคสตัวอย่างจาก [คน/องค์กร] ที่ทำสำเร็จ...",
            34: "❓ [Curiosity]: สงสัยไหมครับว่าทำไม [คำถามชวนคิด]?",
            35: "🆚 [Comparison]: ความแตกต่างระหว่าง [A] กับ [B] คือ...",

            // --- 🎬 PRODUCTION ELEMENTS (การตัดต่อ) ---
            18: "[🎬 B-Roll]: (แทรกภาพประกอบเรื่อง: [สิ่งที่ต้องโชว์])",
            19: "[🔤 Text Overlay]: (ขึ้นตัวหนังสือเน้นคำว่า: [ข้อความ])",
            20: "[🎵 Music Shift]: (เปลี่ยนอารมณ์เพลงเป็น: [แนวเพลง])",
            27: "[🔍 Zoom In]: (ซูมเน้นใบหน้า/จุดสำคัญเพื่อเปลี่ยนอารมณ์)",
            28: "[💥 Sound FX]: (ใส่เสียงเอฟเฟกต์: [ระบุเสียง เช่น Ding!])",
            36: "[🌑 Black Screen]: (ตัดหน้าจอเป็นสีดำเพื่อเน้นคำพูด)",
            37: "[⏩ Fast Forward]: (เร่งความเร็ววิดีโอช่วงที่ [ระบุช่วง])",

            // --- 📈 ENGAGEMENT (เพิ่มยอดเล่น/ยอดแชร์) ---
            11: "💬 [Q&A]: เพื่อนๆ คิดยังไงกับเรื่องนี้ คอมเมนต์บอกหน่อยนะครับ",
            12: "🔔 [Subscribe]: อย่าลืมกด Subscribe และเปิดกระดิ่งไว้นะครับ",
            13: "👍 [Like]: ฝากกดไลก์เป็นกำลังใจให้ผมด้วยนะครับ",
            14: "🎁 [Gift]: ผมมี [ชื่อของแจก] มามอบให้ โหลดได้ที่ใต้คลิปครับ",
            29: "🗳️ [Poll]: เพื่อนๆ เลือกแบบไหน? พิมพ์ 1 หรือ 2 มาบอกกันหน่อย",
            38: "⭐ [Special Guest]: วันนี้ผมมีแขกรับเชิญพิเศษคือ...",

            // --- 🏁 CLOSING & OUTRO (ตอนจบ) ---
            15: "📝 [Summary]: สรุปนะครับ 1... 2... 3...",
            16: "🎬 [Next]: ใครสนใจเรื่อง [หัวข้อถัดไป] กดดูคลิปนี้ต่อเลย",
            17: "🙏 [Thanks]: ขอบคุณที่รับชมจนจบ แล้วพบกันใหม่คลิปหน้าครับ",
            30: "🏁 [Outro Card]: (แสดงปุ่มกดดูคลิปแนะนำ และช่องทางการติดตาม)",
            39: "📢 [Announcement]: ข่าวดี! เร็วๆ นี้ผมจะมี [โปรเจกต์ใหม่]",
            40: "🤫 [Easter Egg]: (ช่วงท้ายคลิปแถมมุกตลกหรือเบื้องหลัง)"
        };

        window.insertText = (id) => {
            const area = document.getElementById('editorTextarea');
            const start = area.selectionStart;
            const text = templates[id] || "";
            area.value = area.value.substring(0, start) + text + "\n" + area.value.substring(area.selectionEnd);
            area.focus();
        };

        window.addCategory = async () => {
            const name = prompt("ชื่อโฟลเดอร์หลักใหม่:");
            if (name) await addDoc(collection(db, "categories"), { name, createdAt: Date.now() });
        };

        window.editCategory = async (id, oldName, event) => {
            event.stopPropagation();
            const newName = prompt("แก้ไขชื่อโฟลเดอร์หลัก:", oldName);
            if (newName && newName !== oldName) {
                await updateDoc(doc(db, "categories", id), { name: newName });
            }
        };

        window.addTopic = async () => {
            if (!currentCategoryId) return alert("โปรดเลือกโฟลเดอร์ก่อนสร้างภารกิจ");
            const title = prompt("ชื่อหัวข้อวิดีโอ:");
            if (title) {
                await addDoc(collection(db, `categories/${currentCategoryId}/topics`), {
                    title, script: "", status: "เตรียมงาน", recordDate: "", editDate: "", uploadDate: "",
                    titles: ["", "", ""], keywords: "", thumbNote: "", createdAt: Date.now()
                });
            }
        };

        window.editTopicTitle = async (topicId, oldTitle) => {
            const newTitle = prompt("แก้ไขชื่อวิดีโอภารกิจ:", oldTitle);
            if (newTitle && newTitle !== oldTitle) {
                const topicRef = doc(db, `categories/${currentCategoryId}/topics`, topicId);
                await updateDoc(topicRef, { title: newTitle });
            }
        };

        window.selectCategory = (id) => {
            currentCategoryId = id;
            renderTopics();
        };

        function renderTopics() {
            onSnapshot(query(collection(db, `categories/${currentCategoryId}/topics`), orderBy("createdAt", "desc")), (snapshot) => {
                const list = document.getElementById('topicList'); list.innerHTML = "";
                snapshot.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="flight-card p-6 mb-4 rounded flex justify-between items-center shadow-xl border-l-4 border-orange-500">
                            <div>
                                <span class="text-[14px] bg-[#ca7f49] px-2 py-0.5 rounded text-black uppercase font-black mb-2 inline-block">สถานะ: ${data.status}</span>
                                <h3 class="text-white font-bold text-3xl mb-1">${data.title}</h3>
                                <button onclick="editTopicTitle('${d.id}', '${data.title.replace(/'/g, "\\'")}')" 
                                        class="text-gray-500 hover:text-warning-yellow text-xs font-bold uppercase transition-all">
                                    <i class="fa-solid fa-pen-to-square mr-1"></i> แก้ไขชื่อภารกิจ
                                </button>
                            </div>
                            <button onclick='window.openEditor("${d.id}", ${JSON.stringify(data).replace(/'/g, "&apos;")})' 
                                    class="bg-[#ca7f49] hover:bg-[#e66000] text-black px-10 py-4 rounded font-black text-xl uppercase tracking-tighter shadow-lg transition-all active:scale-95">
                                  เปิดหน้าเขียนบท
                            </button>
                        </div>`;
                });
            });
        }

        window.openEditor = (topicId, data) => {
            currentTopicId = topicId;
            document.getElementById('editorTextarea').value = data.script || "";
            document.getElementById('metaTitle1').value = data.titles?.[0] || "";
            document.getElementById('metaTitle2').value = data.titles?.[1] || "";
            document.getElementById('metaTitle3').value = data.titles?.[2] || "";
            document.getElementById('metaKeywords').value = data.keywords || "";
            document.getElementById('metaThumb').value = data.thumbNote || "";
            document.getElementById('recordDate').value = data.recordDate || "";
            document.getElementById('editDate').value = data.editDate || "";
            document.getElementById('uploadDate').value = data.uploadDate || "";
            document.getElementById('statusSelect').value = data.status || "เตรียมงาน";
            document.getElementById('scriptEditor').classList.remove('hidden');
        };

        window.saveAll = async () => {
            const topicRef = doc(db, `categories/${currentCategoryId}/topics`, currentTopicId);
            await updateDoc(topicRef, {
                script: document.getElementById('editorTextarea').value,
                titles: [document.getElementById('metaTitle1').value, document.getElementById('metaTitle2').value, document.getElementById('metaTitle3').value],
                keywords: document.getElementById('metaKeywords').value,
                thumbNote: document.getElementById('metaThumb').value,
                recordDate: document.getElementById('recordDate').value,
                editDate: document.getElementById('editDate').value,
                uploadDate: document.getElementById('uploadDate').value,
                status: document.getElementById('statusSelect').value
            });
            alert("บันทึกข้อมูลเรียบร้อย!");
        };

        onSnapshot(query(collection(db, "categories"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById('categoryList'); list.innerHTML = "";
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const isActive = currentCategoryId === docSnap.id;
                list.innerHTML += `
                <div onclick="window.selectCategory('${docSnap.id}')" 
                    class="px-6 py-4 cursor-pointer transition-all border-b border-[#30363d] flex items-center justify-between group ${isActive ? 'bg-orange-600 text-white font-bold' : 'text-gray-400 hover:bg-[#161b22]'}">
                    <div class="flex items-center overflow-hidden">
                        <i class="fa-solid fa-map-location-dot mr-3 flex-shrink-0"></i> 
                        <span class="truncate">${data.name}</span>
                    </div>
                    <button onclick="editCategory('${docSnap.id}', '${data.name.replace(/'/g, "\\'")}', event)" 
                            class="opacity-0 group-hover:opacity-100 p-2 hover:text-warning-yellow transition-all flex-shrink-0">
                        <i class="fa-solid fa-pen-nib text-sm"></i>
                    </button>
                </div>`;
            });
        });

        // --- Microphone System Logic ---
        let audioContext, analyser, animationId;

        window.toggleMic = async () => {
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            const volumeBar = document.getElementById('volume-bar');
            const statusText = document.getElementById('status-label');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusText.innerText = "MIC ACTIVE";
                statusText.style.color = "#22c55e";
                startBtn.disabled = true;
                stopBtn.disabled = false;

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                analyser.fftSize = 256;
                source.connect(analyser);

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                const updateVolume = () => {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                    const average = sum / bufferLength;
                    volumeBar.style.width = Math.min(average * 1.5, 100) + "%";
                    animationId = requestAnimationFrame(updateVolume);
                };
                updateVolume();
                window.localStream = stream;
            } catch (err) {
                alert("Cannot access microphone.");
            }
        };

        window.stopMic = () => {
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            const statusText = document.getElementById('status-label');
            const volumeBar = document.getElementById('volume-bar');

            if (window.localStream) {
                window.localStream.getTracks().forEach(track => track.stop());
                cancelAnimationFrame(animationId);
                volumeBar.style.width = "0%";
                statusText.innerText = "MIC READY";
                statusText.style.color = "#ca7f49";
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        };
    </script>
</head>

<body class="h-screen flex flex-col overflow-hidden">
    <header
        class="h-16 bg-[#0d1117] flex justify-between items-center px-8 shadow-2xl z-20 border-b-2 border-[#30363d]">
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-tower-control text-orange-500 text-2xl"></i>
            <h1 class="text-xl font-black uppercase tracking-[0.2em] text-white">ระบบควบคุม <span
                    class="text-orange-500">YT-AVIATION</span></h1>
        </div>

        <div class="mic-test-panel">
            <div class="flex flex-col">
                <span id="status-label" class="text-[9px] font-black tracking-widest text-orange-500 uppercase">MIC
                    READY</span>
                <div class="meter-bg">
                    <div id="volume-bar"></div>
                </div>
            </div>
            <div class="flex gap-1">
                <button id="start-btn" onclick="toggleMic()" class="mic-btn">Test</button>
                <button id="stop-btn" onclick="stopMic()" class="mic-btn" disabled>Stop</button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-[#0d1117] flex flex-col border-r-2 border-[#30363d]">
            <div class="p-6">
                <button onclick="addCategory()"
                    class="w-full py-4 bg-[#30363d] hover:bg-[#444c56] text-white text-xs font-black rounded-lg shadow-inner uppercase tracking-widest transition-all">
                    <i class="fa-solid fa-folder-plus mr-2"></i> เพิ่มโฟลเดอร์งาน
                </button>
            </div>
            <div id="categoryList" class="flex-1 overflow-y-auto"></div>
        </aside>

        <main class="flex-1 bg-[#010409] p-12 overflow-y-auto">
            <div class="flex justify-between items-center mb-12 border-b border-[#30363d] pb-6">
                <div>
                    <h2 class="text-5xl font-black text-white uppercase tracking-tighter">หน้าควบคุมภารกิจ</h2>
                    <p class="text-gray-500 text-lg mt-2 font-semibold">จัดคิวงานและจัดการสคริปต์วิดีโอของคุณ</p>
                </div>
                <button onclick="addTopic()"
                    class="bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-full font-black text-lg uppercase shadow-2xl transition-all active:scale-95">
                    <i class="fa-solid fa-circle-plus mr-2"></i> เพิ่มวิดีโอใหม่
                </button>
            </div>
            <div id="topicList" class="max-w-5xl"></div>
        </main>
    </div>

    <div id="scriptEditor" class="hidden fixed inset-0 bg-[#000] z-50 flex flex-col">
        <div class="h-20 bg-[#161b22] flex justify-between items-center px-8 border-b-2 border-orange-600 shadow-2xl">
            <div class="flex items-center gap-10">
                <span class="text-orange-500 font-black text-2xl tracking-[0.3em] uppercase">ห้องนักบินเขียนบท</span>
                <select id="statusSelect"
                    class="input-dark px-6 py-2 rounded-lg font-black uppercase cursor-pointer border-orange-500">
                    <option value="เตรียมงาน">1. วางแผนงาน</option>
                    <option value="เขียนบท">2. กำลังเขียนบท</option>
                    <option value="ถ่ายทำ">3. กำลังถ่ายทำ</option>
                    <option value="ตัดต่อ">4. กำลังตัดต่อ</option>
                    <option value="เสร็จสิ้น">5. บินขึ้นแล้ว (เสร็จ)</option>
                </select>
            </div>
            <div class="flex gap-4">
                <button onclick="saveAll()"
                    class="bg-orange-600 hover:bg-orange-700 px-12 py-3 text-xl font-black text-white rounded shadow-xl">บันทึกข้อมูล</button>
                <button onclick="document.getElementById('scriptEditor').classList.add('hidden')"
                    class="bg-[#30363d] hover:bg-[#444] px-8 py-3 text-xl font-black text-white rounded">ยกเลิก</button>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <div class="w-64 bg-[#0d1117] overflow-y-auto border-r-2 border-[#30363d]">
                <div class="p-4 bg-[#161b22] border-b border-[#30363d]">
                    <span class="section-label">ส่วนประกอบสคริปต์</span>
                </div>
                <div id="snippetContainer"></div>
                <script>
                    // 1. กำหนดหัวข้อทั้งหมดไว้ที่นี่ที่เดียว (แก้จุดนี้จุดเดียวจบ)
                    const snippetSource = {
                        1: "Hook: ปัญหา",
                        2: "Hook: ความลับ",
                        3: "Intro: แนะนำตัว",
                        4: "Intro: หัวข้อหลัก",
                        4.1: "------------------ ",
                        5: "Point: ประเด็นสำคัญ",
                        6: "Trick: เคล็ดลับ",
                        7: "Data: สถิติ",
                        8: "Warning: คำเตือน",

                        9: "Example: ตัวอย่าง",
                        10: "How-to: วิธีทำ",
                        11: "Q&A: ถาม-ตอบ",
                        12: "Subscribe: ติดตาม",

                        13: "Like: ไลก์",
                        14: "Gift: ของแจก",
                        15: "Summary: สรุป",
                        16: "Next: คลิปถัดไป",

                        17: "Thanks: ขอบคุณ",
                        18: "Insert: แทรกภาพ",
                        19: "Text: ขึ้นตัวอักษร",
                        20: "Music: เปลี่ยนเพลง",

                        21: "Hook: คำเตือนแรง",
                        22: "Hook: ผลลัพธ์",
                        23: "Hook: ประหยัดเวลา",
                        24: "Intro: ประโยชน์",

                        25: "Point: เปรียบเทียบ",
                        26: "🧪 Case Study",
                        27: "🔍 Zoom In",
                        28: "💥 Sound FX",

                        29: "🗳️ Poll",
                        30: "🏁 Outro Card",
                        31: "🤯 Myth Buster",
                        32: "💰 Value",

                        33: "📜 Intro Story",
                        34: "❓ Curiosity",
                        35: "🆚 Comparison",
                        36: "🌑 Black Screen",

                        37: "⏩ Fast Forward",
                        38: "⭐ Special Guest",
                        39: "📢 Announcement",
                        40: "🤫 Easter Egg"
                    };

                    // 2. สร้าง Array สองก้อนแบบอัตโนมัติจาก Source (ทำให้โค้ดยืดหยุ่น ไม่ต้องเขียนแยกเอง)
                    const templateIds = Object.keys(snippetSource).map(Number);
                    const snippetLabels = Object.values(snippetSource);

                    // 3. ส่วนแสดงผลใช้ลอจิกเดิมของคุณเป๊ะๆ
                    const sc = document.getElementById('snippetContainer');
                    sc.innerHTML = "";
                    snippetLabels.forEach((label, i) => {
                        const id = templateIds[i];
                        sc.innerHTML += `
    <button onclick="insertText('${id}')" class="btn-snippet">
        <span class="text-orange-600 mr-2 font-mono">${id.toString().includes('.') ? id : id.toString().padStart(2, '0')}</span> ${label}
    </button>`;
                    });
                </script>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="flex-1 overflow-hidden relative">
                    <div
                        class="absolute top-4 right-10 text-orange-900 font-mono text-[80px] opacity-10 pointer-events-none select-none">
                        CONFIDENTIAL</div>
                    <textarea id="editorTextarea" class="w-full h-full relative z-10"
                        placeholder="// เริ่มต้นพิมพ์บทวิดีโอที่นี่..."></textarea>
                </div>

                <div
                    class="h-80 bg-[#161b22] border-t-4 border-[#30363d] p-8 grid grid-cols-3 gap-12 shadow-inner overflow-y-auto">
                    <div class="flex flex-col gap-4">
                        <span class="section-label">กำหนดการเดินทาง</span>
                        <div class="space-y-4">
                            <div class="flex items-center gap-4">
                                <span class="text-[11px] w-24 text-gray-500 font-bold uppercase">วันถ่ายทำ:</span>
                                <input type="date" id="recordDate" class="input-dark flex-1 p-2 rounded text-sm">
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-[11px] w-24 text-gray-500 font-bold uppercase">วันตัดต่อ:</span>
                                <input type="date" id="editDate" class="input-dark flex-1 p-2 rounded text-sm">
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-[11px] w-24 text-gray-500 font-bold uppercase">วันลงคลิป:</span>
                                <input type="date" id="uploadDate" class="input-dark flex-1 p-2 rounded text-sm">
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-4">
                        <span class="section-label text-warning-yellow">ตัวเลือกชื่อคลิป (Titles)</span>
                        <input id="metaTitle1" class="input-dark p-3 rounded shadow-inner text-sm"
                            placeholder="ชื่อที่ 1 (ดีที่สุด)">
                        <input id="metaTitle2" class="input-dark p-3 rounded shadow-inner text-sm"
                            placeholder="ชื่อที่ 2">
                        <input id="metaTitle3" class="input-dark p-3 rounded shadow-inner text-sm"
                            placeholder="ชื่อที่ 3">
                    </div>
                    <div class="flex flex-col gap-4">
                        <span class="section-label text-radar-green">บันทึกช่วยจำ & SEO</span>
                        <input id="metaKeywords" class="input-dark p-3 rounded text-sm"
                            placeholder="คำค้นหา (Keywords)">
                        <textarea id="metaThumb" class="input-dark flex-1 p-3 rounded resize-none text-sm"
                            placeholder="โน้ตเกี่ยวกับปกคลิป..."></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
