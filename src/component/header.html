 
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | App Hub</title>

  <!-- Bootstrap 5 & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Fonts: Inter & Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --nav-bg: #0f172a;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', 'Noto Sans Thai', sans-serif;
      min-height: 100vh;
    }

    /* Navbar Custom */
    .navbar-custom {
      background-color: var(--nav-bg);
    }

    /* Card Menu Styles */
    .card-menu {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background-color: var(--card-bg);
    }

    .card-menu:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1) !important;
      border-color: rgba(99, 102, 241, 0.4);
    }

    .card-icon-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 1.6rem;
    }

    /* Icon Background Themes */
    .theme-primary {
      background: #e0e7ff;
      color: #4338ca;
    }

    .theme-success {
      background: #dcfce7;
      color: #15803d;
    }

    .theme-warning {
      background: #fef3c7;
      color: #b45309;
    }

    .theme-info {
      background: #e0f2fe;
      color: #0369a1;
    }

    .theme-danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    .theme-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .theme-dark {
      background: #e2e8f0;
      color: #0f172a;
    }

    /* Clean Search Bar */
    .search-input {
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .search-input::placeholder {
      color: #94a3b8;
    }

    .search-input:focus {
      background-color: rgba(255, 255, 255, 0.15);
      border-color: #6366f1;
      color: #fff;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm py-3">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
        <i class="bi bi-grid-1x2-fill text-indigo" style="color: #6366f1;"></i>
        <span>My App Workspace</span>
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0"></ul>

        <!-- Live Search Input -->
        <div class="d-flex" role="search">
          <div class="input-group">
            <span class="input-group-text search-input border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input id="searchInput" class="form-control search-input border-start-0" type="search"
              placeholder="ค้นหาเมนู..." aria-label="Search">
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content Area -->
  <div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="fw-bold mb-1">เมนูระบบหลัก</h3>
        <p class="text-muted small mb-0">เลือกเข้าใช้งานแอปพลิเคชันและเครื่องมือต่างๆ</p>
      </div>
    </div>

    <!-- Cards Grid Container -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="menuContainer">
      <!-- Cards จะถูกสร้างขึ้นอัตโนมัติจาก JS -->
    </div>

    <!-- No Result Message -->
    <div id="noResults" class="text-center py-5 d-none">
      <i class="bi bi-search-heart text-muted display-4 mb-3"></i>
      <p class="text-muted">ไม่พบเมนูที่คุณกำลังค้นหา</p>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. กำหนดรายการเมนูทั้งหมดที่นี่ (แก้ไข/เพิ่มง่ายมาก)
    // ==========================================
    const menuItems = [
      {
        title: 'Home',
        description: 'หน้าหลักของเว็บไซต์',
        url: '/index.html',
        icon: 'bi-house-door-fill',
        theme: 'theme-primary'
      },
      {
        title: 'Workout',
        description: 'บันทึกการออกกำลังกาย',
        url: '/src/page/workout.html',
        icon: 'bi-lightning-charge-fill',
        theme: 'theme-success'
      },
      {
        title: 'CRUD Google',
        description: 'จัดการข้อมูล CRUD',
        url: '/src/page/a.html',
        icon: 'bi-terminal-fill',
        theme: 'theme-dark'
      },
      {
        title: 'Test Firebase',
        description: 'ทดสอบ Input และ Database',
        url: '/src/page/test.html',
        icon: 'bi-database-fill',
        theme: 'theme-warning'
      },
      {
        title: 'Color Picker',
        description: 'เครื่องมือเลือกสีสำหรับงานดีไซน์',
        url: '/src/page/color.html',
        icon: 'bi-palette-fill',
        theme: 'theme-info'
      },
      {
        title: 'Tools',
        description: 'เครื่องมืออำนวยความสะดวก',
        url: '/src/page/tool.html',
        icon: 'bi-tools',
        theme: 'theme-secondary'
      },
      {
        title: 'Tasks',
        description: 'รายการสิ่งที่ต้องทำ',
        url: '/src/page/tasks.html',
        icon: 'bi-list-check',
        theme: 'theme-danger'
      },
      {
        title: 'คำนวณจำนวนนม',
        description: 'เครื่องมือคำนวณจำนวนนม',
        url: '/src/page/c_milk.html',
        icon: 'bi-calculator-fill',
        theme: 'theme-primary'
      },
      {
        title: 'Note',
        description: 'สมุดบันทึกข้อความ',
        url: '/src/page/note.html',
        icon: 'bi-journal-text',
        theme: 'theme-primary'
      },
      {
        title: 'Book',
        description: 'ระบบจัดการหนังสือ',
        url: '/src/page/book/index.html',
        icon: 'bi-book-fill',
        theme: 'theme-primary'
      },
      {
        title: 'Book Admin',
        description: 'จัดการระบบหลังบ้านหนังสือ',
        url: '/src/page/book/admin.html',
        icon: 'bi-journal-bookmark-fill',
        theme: 'theme-dark'
      },
      {
        title: 'YT Admin',
        description: 'ระบบจัดการ YouTube Content',
        url: '/src/page/page2.html',
        icon: 'bi-youtube',
        theme: 'theme-danger'
      },
      {
        title: 'FB Admin',
        description: 'ระบบจัดการ Facebook Page',
        url: '/src/page/page3.html',
        icon: 'bi-facebook',
        theme: 'theme-info'
      },
      {
        title: 'Todo My Job',
        description: 'รายการงานส่วนตัวที่ต้องทำ',
        url: '/src/page/todo2.html',
        icon: 'bi-check2-square',
        theme: 'theme-success'
      }
    ];

    // ==========================================
    // 2. Function สำหรับแสดงผล Card บนหน้าจอ
    // ==========================================
    function renderMenu(items) {
      const container = document.getElementById('menuContainer');
      const noResults = document.getElementById('noResults');

      container.innerHTML = '';

      if (items.length === 0) {
        noResults.classList.remove('d-none');
        return;
      } else {
        noResults.classList.add('d-none');
      }

      items.forEach(item => {
        const cardHTML = `
          <div class="col">
            <a href="${item.url}" class="text-decoration-none">
              <div class="card h-100 shadow-sm card-menu text-center p-3">
                <div class="card-body p-2 d-flex flex-column align-items-center justify-content-center">
                  <div class="card-icon-wrapper ${item.theme}">
                    <i class="bi ${item.icon}"></i>
                  </div>
                  <h6 class="card-title fw-bold text-dark mb-1">${item.title}</h6>
                  <p class="card-text text-muted small mb-0">${item.description || ''}</p>
                </div>
              </div>
            </a>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    // ==========================================
    // 3. ระบบ Live Search กรองเมนู real-time
    // ==========================================
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const keyword = e.target.value.toLowerCase().trim();
      const filtered = menuItems.filter(item =>
        item.title.toLowerCase().includes(keyword) ||
        item.description.toLowerCase().includes(keyword)
      );
      renderMenu(filtered);
    });

    // แสดงผลครั้งแรก
    renderMenu(menuItems);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
