<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .body-custom {
      background-color: #e9ecef;
    }

    .navbar-custom {
      background-color: #17a2b8;
    }

    .card-menu {
      transition: transform 0.2s;
      cursor: pointer;
    }

    .card-menu:hover {
      transform: translateY(-5px);
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
    }

    .card-icon {
      font-size: 2.5rem;
    }
  </style>
</head>

<body class="body-custom">

  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid">
      <div class="navbar-brand fs-4 fw-bold">My App</div>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <form class="d-flex ms-auto" role="search">
          <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
          <button class="btn btn-outline-light" type="submit">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="mb-4 text-center text-secondary fw-light">✨✨ เมนูหลัก ✨✨</h2>
    <hr>
    <div id="menu-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
  </div>

  <script>
    // 1. เก็บข้อมูลเมนูทั้งหมดไว้ที่นี่
    const menuData = [
      {
        title: "Home",
        desc: "หน้าหลักของเว็บไซต์",
        icon: "bi-house-door-fill",
        color: "primary",
        link: "/index.html"
      },
      {
        title: "Workout",
        desc: "บันทึกการออกกำลังกาย",
        icon: "bi-lightning-charge-fill",
        color: "success",
        link: "/src/page/workout.html"
      },
      {
        title: "CRUD Google",
        desc: "จัดการข้อมูลพื้นฐาน",
        icon: "bi-grid-fill",
        color: "dark",
        link: "/src/page/a.html"
      },
      {
        title: "Test Firebase",
        desc: "ทดสอบ Input และ Database",
        icon: "bi-database-fill",
        color: "warning",
        link: "/src/page/test.html"
      },
      {
        title: "Color Picker",
        desc: "เครื่องมือเลือกสี",
        icon: "bi-palette-fill",
        color: "info",
        link: "/src/page/color.html"
      },
      {
        title: "Tools",
        desc: "เครื่องมืออำนวยความสะดวก",
        icon: "bi-tools",
        color: "secondary",
        link: "/src/page/tool.html"
      },
      {
        title: "Tasks",
        desc: "รายการสิ่งที่ต้องทำ",
        icon: "bi-list-check",
        color: "danger",
        link: "/src/page/tasks.html"
      },
      {
        title: "คำนวณจำนวนนม",
        desc: "เครื่องมือคำนวณจำนวนนม",
        icon: "bi-calculator-fill",
        color: "primary",
        link: "/src/page/c_milk.html"
      },
      {
        title: "Note",
        desc: "บันทึกข้อความ",
        icon: "bi-journal-text",
        color: "primary",
        link: "/src/page/note.html"
      },
      {
        title: "book",
        desc: "บันทึกข้อความ",
        icon: "bi-journal-text",
        color: "primary",
        link: "/src/page/book/index.html"
      },
       {
        title: "book",
        desc: "บันทึกข้อความ",
        icon: "bi-journal-text",
        color: "primary",
        link: "/src/page/book/admin.html"
      },
    ];

    // 2. ฟังก์ชันสำหรับสร้าง HTML จากข้อมูล
    function renderMenus(data) {
      const container = document.getElementById('menu-container');

      const html = data.map(item => `
        <div class="col">
            <a href="${item.link}" class="text-decoration-none">
                <div class="card h-100 shadow-sm card-menu border-${item.color} text-center">
                    <div class="card-body">
                        <i class="bi ${item.icon} text-${item.color} card-icon mb-3"></i>
                        <h5 class="card-title text-dark">${item.title}</h5>
                        <p class="card-text text-muted small">${item.desc}</p>
                    </div>
                </div>
            </a>
        </div>
    `).join('');

      container.innerHTML = html;
    }

    // 3. รันฟังก์ชันเมื่อโหลดหน้าเว็บ
    document.addEventListener('DOMContentLoaded', () => {
      renderMenus(menuData);
    });


  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
