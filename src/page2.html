 
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์ควบคุมการบิน YouTube Ultimate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Kanit:wght@300;400;600&display=swap');

        :root {
            --cockpit-bg: #0f1113;
            --panel-bg: #1e2124;
            --neon-green: #00ff41;
            --warning-orange: #ff9f00;
            --sky-blue: #00d4ff;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--cockpit-bg);
            color: #e0e0e0;
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 2px solid #32373c;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }

        .crt-screen {
            background: #050708;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15);
            position: relative;
            overflow-y: auto;
        }

        .flight-btn {
            background: linear-gradient(145deg, #2c3136, #1a1c1e);
            border: 1px solid #111;
            transition: all 0.2s;
            font-weight: bold;
            text-align: center;
        }

        .flight-btn:active {
            transform: scale(0.98);
            box-shadow: inset 2px 2px 5px #000;
        }

        .flight-btn-green {
            border-bottom: 3px solid var(--neon-green);
            color: var(--neon-green);
        }

        .flight-btn-blue {
            border-bottom: 3px solid var(--sky-blue);
            color: var(--sky-blue);
        }

        .date-input,
        .status-select,
        .meta-input {
            background: #0a0c0e;
            border: 1px solid #3f444a;
            color: var(--neon-green);
            padding: 5px;
            border-radius: 4px;
            font-size: 11px;
            outline: none;
        }

        .audio-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .audio-progress {
            height: 100%;
            width: 0%;
            background: var(--neon-green);
            transition: width 0.1s;
            box-shadow: 0 0 10px var(--neon-green);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHd60VAO__hpRlV0Ne0meDy7qRcEaAlnU",
            authDomain: "yt-90eb3.firebaseapp.com",
            projectId: "yt-90eb3",
            storageBucket: "yt-90eb3.firebasestorage.app",
            messagingSenderId: "622222071571",
            appId: "1:622222071571:web:af77604f4f45db960eece6",
            measurementId: "G-FR0VTD4BMJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentCategoryId = null;
        let currentTopicId = null;
        let audioContext, analyser, microphone, javascriptNode;

        // --- Core Functions ---
        window.addCategory = async () => {
            const name = prompt("ระบุชื่อหมวดหมู่ใหม่:");
            if (name) await addDoc(collection(db, "categories"), { name, createdAt: Date.now() });
        };

        window.deleteCategory = async (id, e) => {
            e.stopPropagation();
            if (confirm("ลบหมวดหมู่และข้อมูลทั้งหมด?")) await deleteDoc(doc(db, "categories", id));
        };

        window.addTopic = async () => {
            if (!currentCategoryId) return alert("กรุณาเลือกหมวดหมู่ก่อน");
            const title = prompt("ชื่อหัวข้อวิดีโอ:");
            if (title) {
                await addDoc(collection(db, `categories/${currentCategoryId}/topics`), {
                    title, script: "", status: "เตรียมงาน",
                    recordDate: "", editDate: "", uploadDate: "",
                    titles: ["", "", ""], keywords: "", thumbNote: "",
                    gearCheck: [false, false, false, false],
                    createdAt: Date.now()
                });
            }
        };

        window.updateField = async (topicId, field, value) => {
            const topicRef = doc(db, `categories/${currentCategoryId}/topics`, topicId);
            await updateDoc(topicRef, { [field]: value });
        };

        // --- Audio Check Function ---
        window.toggleAudio = async () => {
            const btn = document.getElementById('audioBtn');
            const bar = document.getElementById('audioProgress');

            if (audioContext) {
                audioContext.close();
                audioContext = null;
                btn.innerHTML = '<i class="fas fa-microphone"></i> ทดสอบสัญญาณไมค์';
                bar.style.width = "0%";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;
                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = () => {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) values += array[i];
                    const average = values / array.length;
                    bar.style.width = Math.min(average * 2, 100) + "%";
                };
                btn.innerHTML = '<span class="animate-pulse text-red-500">● กำลังรับสัญญาณไมค์</span>';
            } catch (err) { alert("ไม่สามารถเข้าถึงไมค์ได้: " + err); }
        };

        // --- Editor Functions ---
        window.openEditor = (topicId, data) => {
            currentTopicId = topicId;
            document.getElementById('editorTextarea').value = data.script || "";
            document.getElementById('metaTitle1').value = data.titles?.[0] || "";
            document.getElementById('metaTitle2').value = data.titles?.[1] || "";
            document.getElementById('metaTitle3').value = data.titles?.[2] || "";
            document.getElementById('metaKeywords').value = data.keywords || "";
            document.getElementById('metaThumb').value = data.thumbNote || "";

            const gearHtml = ['กล้อง/มือถือ', 'ไมโครโฟน', 'ไฟ/แบ็คกราวด์', 'พร็อพ/สินค้า'].map((label, i) => `
                <label class="flex items-center gap-2 mb-1 cursor-pointer">
                    <input type="checkbox" ${data.gearCheck?.[i] ? 'checked' : ''} onchange="window.updateGear(${i}, this.checked)" class="accent-green-500">
                    <span class="text-[11px]">${label}</span>
                </label>
            `).join('');
            document.getElementById('gearList').innerHTML = gearHtml;

            document.getElementById('scriptEditor').classList.remove('hidden');
        };

        window.updateGear = async (index, value) => {
            const topicRef = doc(db, `categories/${currentCategoryId}/topics`, currentTopicId);
            // เพื่อความง่ายในตัวอย่างนี้ เราจะดึงข้อมูลมาอัปเดตแบบเฉพาะส่วน
            onSnapshot(topicRef, async (d) => {
                let gear = d.data().gearCheck || [false, false, false, false];
                gear[index] = value;
                await updateDoc(topicRef, { gearCheck: gear });
            }, { once: true });
        };

        window.saveAll = async () => {
            const topicRef = doc(db, `categories/${currentCategoryId}/topics`, currentTopicId);
            await updateDoc(topicRef, {
                script: document.getElementById('editorTextarea').value,
                titles: [document.getElementById('metaTitle1').value, document.getElementById('metaTitle2').value, document.getElementById('metaTitle3').value],
                keywords: document.getElementById('metaKeywords').value,
                thumbNote: document.getElementById('metaThumb').value
            });
            alert("บันทึกข้อมูลทั้งหมดเข้าระบบแล้ว");
        };

        window.insertText = (text) => {
            const area = document.getElementById('editorTextarea');
            const start = area.selectionStart;
            area.value = area.value.substring(0, start) + text + "\n" + area.value.substring(area.selectionEnd);
            area.focus();
        };

        // --- Render Lists ---
        onSnapshot(query(collection(db, "categories"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById('categoryList');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const isActive = currentCategoryId === doc.id;
                list.innerHTML += `
                    <div onclick="window.selectCategory('${doc.id}')" class="p-4 mb-2 glass-panel cursor-pointer flex justify-between items-center ${isActive ? 'border-green-500 bg-[#2a2d31]' : ''}">
                        <span class="text-sm font-bold">${doc.data().name}</span>
                        <button onclick="deleteCategory('${doc.id}', event)" class="text-red-900 hover:text-red-500">🗑️</button>
                    </div>`;
            });
        });

        window.selectCategory = (id) => { currentCategoryId = id; renderTopics(); };

        function renderTopics() {
            onSnapshot(query(collection(db, `categories/${currentCategoryId}/topics`), orderBy("createdAt", "desc")), (snapshot) => {
                const list = document.getElementById('topicList');
                list.innerHTML = "";
                snapshot.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="p-4 glass-panel mb-4 border-l-4 ${data.status === 'เสร็จสิ้น' ? 'border-green-500' : 'border-orange-500'}">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h4 class="font-bold text-orange-400 text-lg uppercase font-mono">> ${data.title}</h4>
                                    <select onchange="updateField('${d.id}', 'status', this.value)" class="status-select mt-1">
                                        <option value="เตรียมงาน" ${data.status === 'เตรียมงาน' ? 'selected' : ''}>⚪ เตรียมงาน</option>
                                        <option value="เขียนบท" ${data.status === 'เขียนบท' ? 'selected' : ''}>🟡 เขียนบท</option>
                                        <option value="ถ่ายทำ" ${data.status === 'ถ่ายทำ' ? 'selected' : ''}>🔴 ถ่ายทำ</option>
                                        <option value="ตัดต่อ" ${data.status === 'ตัดต่อ' ? 'selected' : ''}>🔵 ตัดต่อ</option>
                                        <option value="เสร็จสิ้น" ${data.status === 'เสร็จสิ้น' ? 'selected' : ''}>🟢 เสร็จสิ้น</option>
                                    </select>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick='window.openEditor("${d.id}", ${JSON.stringify(data).replace(/'/g, "&apos;")})' class="flight-btn flight-btn-green px-4 py-2 text-xs rounded">ควบคุมภารกิจ</button>
                                    <button onclick="deleteDoc(doc(db, 'categories/${currentCategoryId}/topics', '${d.id}'))" class="text-red-500 px-2">🗑️</button>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="text-[9px]">อัด: <input type="date" value="${data.recordDate}" onchange="updateField('${d.id}', 'recordDate', this.value)" class="date-input w-full"></div>
                                <div class="text-[9px]">ตัด: <input type="date" value="${data.editDate}" onchange="updateField('${d.id}', 'editDate', this.value)" class="date-input w-full"></div>
                                <div class="text-[9px]">ลง: <input type="date" value="${data.uploadDate}" onchange="updateField('${d.id}', 'uploadDate', this.value)" class="date-input w-full"></div>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</head>

<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-3 bg-[#0a0c0e] border-b-2 border-[#333] flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-red-600 flex items-center justify-center shadow-lg shadow-red-900/50">
                <i class="fab fa-youtube text-white"></i>
            </div>
            <h1 class="font-black text-white italic tracking-widest text-sm md:text-base">YT-COMMAND CENTER <span
                    class="text-xs font-normal text-gray-500 ml-2">V.ULTIMATE</span></h1>
        </div>

        <div class="flex items-center gap-4">
            <div class="hidden md:block w-48">
                <p class="text-[9px] text-gray-500 mb-1 font-mono uppercase">ระดับเสียงไมโครโฟน</p>
                <div class="audio-bar">
                    <div id="audioProgress" class="audio-progress"></div>
                </div>
            </div>
            <button id="audioBtn" onclick="toggleAudio()"
                class="flight-btn px-4 py-1 text-[10px] rounded border-blue-500 text-blue-400">
                <i class="fas fa-microphone"></i> ทดสอบสัญญาณไมค์
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden p-2 gap-2">
        <aside class="w-64 flex flex-col">
            <button onclick="addCategory()"
                class="flight-btn p-3 text-xs mb-3 text-green-400 border-green-900 hover:bg-green-900/20">+
                เพิ่มหมวดหมู่ภารกิจ</button>
            <div id="categoryList" class="flex-1 overflow-y-auto"></div>

            <div class="glass-panel p-3 mt-2">
                <p class="text-[10px] text-orange-500 font-bold mb-2 uppercase border-b border-orange-900">
                    บันทึกไอเดียด่วน</p>
                <textarea
                    class="w-full bg-black text-[11px] p-2 rounded border border-gray-800 h-24 outline-none focus:border-orange-500"
                    placeholder="นึกอะไรออกพิมพ์ทิ้งไว้ที่นี่..."></textarea>
            </div>
        </aside>

        <section class="flex-1 flex flex-col">
            <div class="p-2 flex justify-between items-center">
                <span
                    class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">สถานะงานในระบบปัจจุบัน</span>
                <button onclick="addTopic()" class="flight-btn flight-btn-green px-6 py-2 rounded text-sm">+
                    สร้างวิดีโอใหม่</button>
            </div>
            <div id="topicList" class="flex-1 crt-screen p-4 rounded-lg border-2 border-gray-900"></div>
        </section>
    </main>

    <!-- Editor Interface -->
    <div id="scriptEditor" class="hidden fixed inset-0 bg-[#050708] z-50 flex flex-col p-4">
        <div
            class="glass-panel p-3 mb-3 flex justify-between items-center border-orange-500 shadow-[0_0_20px_rgba(255,159,0,0.1)]">
            <h3 class="font-bold text-orange-500 font-mono italic uppercase">ห้องควบคุมภารกิจ : MISSION CONTROL</h3>
            <div class="flex gap-2">
                <button onclick="saveAll()"
                    class="bg-green-600 hover:bg-green-500 px-8 py-2 rounded-full text-xs font-bold text-black">บันทึกข้อมูลทั้งหมด</button>
                <button onclick="document.getElementById('scriptEditor').classList.add('hidden')"
                    class="bg-gray-700 px-8 py-2 rounded-full text-xs font-bold">ยกเลิก/ปิด</button>
            </div>
        </div>

        <div class="flex flex-1 gap-4 overflow-hidden">
            <!-- Sidebar: Helper Buttons -->
            <div class="w-72 flex flex-col gap-3">
                <div class="glass-panel p-3 overflow-y-auto flex-1 text-[10px]">
                    <p class="text-green-500 border-b border-green-900 mb-2 font-bold uppercase">ปุ่มช่วยเขียน (20 ปุ่ม)
                    </p>
                    <div class="flex flex-col gap-1">
                        <button onclick="insertText('🔥 [Hook]: คุณเคยเจอปัญหานี้ไหม...')"
                            class="flight-btn p-2 text-left hover:text-green-400">01. ปัญหานำเรื่อง</button>
                        <button onclick="insertText('🚀 [Hook]: ในคลิปนี้ผมจะเผยความลับของ...')"
                            class="flight-btn p-2 text-left hover:text-green-400">02. เปิดเผยความลับ</button>
                        <button onclick="insertText('👋 [Intro]: สวัสดีครับทุกคน ยินดีต้อนรับสู่...')"
                            class="flight-btn p-2 text-left hover:text-green-400">03. ทักทายทางการ</button>
                        <button onclick="insertText('📌 [Topic]: วันนี้เราจะมาคุยกันเรื่อง...')"
                            class="flight-btn p-2 text-left hover:text-green-400">04. แจ้งหัวข้อ</button>
                        <button onclick="insertText('✅ [Point 1]: ประเด็นที่ 1 คือ...')"
                            class="flight-btn p-2 text-left text-orange-400">05. ประเด็นที่ 1</button>
                        <button onclick="insertText('💡 [Tip]: เทคนิคพิเศษคือ...')"
                            class="flight-btn p-2 text-left text-orange-400">06. สอดแทรกเทคนิค</button>
                        <button onclick="insertText('📊 [Data]: จากสถิติพบว่า...')"
                            class="flight-btn p-2 text-left text-orange-400">07. อ้างอิงสถิติ</button>
                        <button onclick="insertText('⚠️ [Caution]: สิ่งที่ต้องระวังคือ...')"
                            class="flight-btn p-2 text-left text-orange-400">08. ข้อควรระวัง</button>
                        <button onclick="insertText('🔄 [Example]: ยกตัวอย่างเช่น...')"
                            class="flight-btn p-2 text-left text-orange-400">09. ตัวอย่างประกอบ</button>
                        <button onclick="insertText('🛠️ [Tutorial]: ขั้นตอนแรกคือ...')"
                            class="flight-btn p-2 text-left text-orange-400">10. เริ่มสอน</button>
                        <button onclick="insertText('💬 [Question]: เพื่อนๆคิดยังไง? คอมเมนต์บอกหน่อย')"
                            class="flight-btn p-2 text-left text-sky-400">11. ถามความเห็น</button>
                        <button onclick="insertText('🔔 [CTA]: อย่าลืมกดติดตามนะครับ')"
                            class="flight-btn p-2 text-left text-sky-400">12. ฝากติดตาม</button>
                        <button onclick="insertText('👍 [CTA]: ฝากกด Like เป็นกำลังใจด้วยนะ')"
                            class="flight-btn p-2 text-left text-sky-400">13. ขอ Like</button>
                        <button onclick="insertText('🎁 [Bonus]: ท้ายคลิปมีของรางวัลด้วยนะ')"
                            class="flight-btn p-2 text-left text-sky-400">14. บอกโบนัส</button>
                        <button onclick="insertText('📝 [Summary]: สรุปเนื้อหาวันนี้คือ...')"
                            class="flight-btn p-2 text-left text-red-400">15. สรุปเนื้อหา</button>
                        <button onclick="insertText('🎬 [Next]: คลิปต่อไปจะสอนเรื่อง...')"
                            class="flight-btn p-2 text-left text-red-400">16. Teaser หน้า</button>
                        <button onclick="insertText('🙏 [Outro]: ขอบคุณที่ชมจนจบ สวัสดีครับ')"
                            class="flight-btn p-2 text-left text-red-400">17. กล่าวปิด</button>
                        <button onclick="insertText('[B-Roll: แทรกภาพ... ]')"
                            class="flight-btn p-2 text-left opacity-50 italic">18. แทรกภาพ</button>
                        <button onclick="insertText('[Text: ขึ้นตัวอักษร... ]')"
                            class="flight-btn p-2 text-left opacity-50 italic">19. ขึ้นอักษร</button>
                        <button onclick="insertText('[SFX: เสียงเอฟเฟกต์... ]')"
                            class="flight-btn p-2 text-left opacity-50 italic">20. เสียงประกอบ</button>
                    </div>
                </div>
                <!-- Gear Checklist -->
                <div class="glass-panel p-3">
                    <p class="text-[10px] text-sky-400 font-bold mb-2 uppercase border-b border-sky-900">เตรียมอุปกรณ์
                        (Gear)</p>
                    <div id="gearList"></div>
                </div>
            </div>

            <!-- Main Editor and Metadata -->
            <div class="flex-1 flex flex-col gap-4 overflow-hidden">
                <div class="flex-1 crt-screen p-4 border-gray-800">
                    <textarea id="editorTextarea"
                        class="w-full h-full bg-transparent text-green-500 font-mono text-lg outline-none resize-none leading-relaxed"
                        placeholder="กรุณาป้อนพิกัดสคริปต์วิดีโอ..."></textarea>
                </div>

                <!-- Metadata Console -->
                <div class="h-56 glass-panel p-4 grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <p class="text-[10px] text-orange-400 font-bold uppercase underline">ตัวเลือกชื่อคลิป (Video
                            Titles)</p>
                        <input id="metaTitle1" class="meta-input" placeholder="แบบที่ 1 (ดึงดูด)">
                        <input id="metaTitle2" class="meta-input" placeholder="แบบที่ 2 (คีย์เวิร์ด)">
                        <input id="metaTitle3" class="meta-input" placeholder="แบบที่ 3 (สั้นๆ)">
                    </div>
                    <div class="flex flex-col gap-2">
                        <p class="text-[10px] text-sky-400 font-bold uppercase underline">ข้อมูลประกอบ (Metadata)</p>
                        <input id="metaKeywords" class="meta-input" placeholder="คีย์เวิร์ดที่สำคัญ (Keywords)">
                        <textarea id="metaThumb" class="meta-input h-full resize-none"
                            placeholder="รายละเอียดรูปหน้าปก (Thumbnail Concept)"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
