 !DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT MISSION CONTROL V4.0 - FIREBASE & AUDIO FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Anuphan:wght@300;500;700&display=swap');

        body {
            background-color: #050505;
            color: #33ff33;
            font-family: 'Anuphan', sans-serif;
            overflow-x: hidden;
        }

        .cockpit-panel {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid #333;
            position: relative;
        }

        .btn-cockpit {
            background: #222;
            border: 1px solid #444;
            transition: all 0.1s ease;
            box-shadow: 0 3px 0 #111;
            cursor: pointer;
        }

        .btn-cockpit:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #111;
        }

        .grid-bg {
            background-image: radial-gradient(rgba(51, 255, 51, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #333;
        }

        .cal-day {
            background: #0a0a0a;
            min-height: 65px;
            padding: 5px;
            font-size: 11px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .tab-active {
            color: #33ff33;
            border-bottom: 2px solid #33ff33;
            background: rgba(51, 255, 51, 0.05);
        }

        .mic-monitor-bg {
            background: #000;
            border: 1px solid #004400;
        }

        .meter-segment {
            height: 4px;
            width: 100%;
            margin-bottom: 2px;
            background: #111;
        }

        .meter-active-green {
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }

        .meter-active-yellow {
            background: #ffff00;
            box-shadow: 0 0 5px #ffff00;
        }

        .meter-active-red {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #33ff33;
        }
    </style>
</head>

<body class="p-4 grid-bg">

    <header class="mb-6 flex justify-between items-end border-b border-green-900/50 pb-4">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-green-400">YT MISSION CONTROL // CLOUD V4</h1>
            <p class="text-[10px] text-green-700 uppercase tracking-widest">Storage: <span
                    class="text-blue-400">Firebase Firestore</span></p>
        </div>
        <div class="flex gap-6 text-[11px] font-mono">
            <div class="text-right">
                <p class="text-green-800">ภารกิจ</p>
                <p id="stat-total" class="text-white text-lg">0</p>
            </div>
            <div class="text-right">
                <p class="text-green-800">TIME</p>
                <p id="clock" class="text-green-400 text-lg">00:00:00</p>
            </div>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4">
        <!-- LEFT: INPUT -->
        <div class="col-span-12 lg:col-span-3 space-y-4">
            <div class="cockpit-panel p-4 rounded-lg">
                <span class="text-[10px] font-bold text-green-500 uppercase block mb-3 border-b border-green-900/30">New
                    Mission</span>
                <div class="space-y-3">
                    <input type="text" id="mission-name" placeholder="ชื่อวิดีโอ..."
                        class="w-full bg-black border border-green-900/50 p-2 text-xs text-green-400 focus:outline-none">
                    <div class="space-y-2">
                        <input type="date" id="date-rec"
                            class="w-full bg-black border border-gray-800 p-1 text-[10px] text-white">
                        <input type="date" id="date-pub"
                            class="w-full bg-black border border-gray-800 p-1 text-[10px] text-white">
                    </div>
                    <button id="btn-add-mission"
                        class="w-full btn-cockpit py-3 text-xs font-bold text-green-400 hover:bg-green-400/10">RECORD
                        MISSION</button>
                </div>
            </div>
            <div class="cockpit-panel p-4 rounded-lg">
                <span class="text-[10px] font-bold text-green-500 uppercase block mb-3">Logs</span>
                <div class="space-y-2 max-h-[200px] overflow-y-auto pr-2" id="idea-list"></div>
            </div>
        </div>

        <!-- CENTER: SCRIPT & CALENDAR -->
        <div class="col-span-12 lg:col-span-6 space-y-4">
            <div class="cockpit-panel rounded-lg min-h-[550px] flex flex-col p-4">
                <div class="flex border-b border-green-900/30 mb-4 font-bold uppercase text-[11px]">
                    <button id="tab-script-btn" class="px-6 py-2 tab-active">Script Engine</button>
                    <button id="tab-calendar-btn" class="px-6 py-2 text-green-900">Calendar</button>
                </div>
                <div id="content-script" class="flex flex-col flex-grow">
                    <textarea id="main-script" placeholder="เริ่มเขียนสคริปต์..."
                        class="w-full flex-grow bg-black/40 border border-green-900/40 rounded p-4 text-green-400 text-sm font-mono focus:outline-none"></textarea>
                </div>
                <div id="content-calendar" class="hidden flex-grow">
                    <div class="cal-grid" id="calendar-body"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button id="btn-save-all" class="btn-cockpit py-2 rounded text-green-400 text-[10px] font-bold">SAVE
                        TO CLOUD</button>
                    <button id="btn-clear" class="btn-cockpit py-2 rounded text-red-500 text-[10px] font-bold">CLEAR
                        DATA</button>
                </div>
            </div>
        </div>

        <!-- RIGHT: AUDIO -->
        <div class="col-span-12 lg:col-span-3 space-y-4">
            <div class="cockpit-panel p-4 rounded-lg space-y-3">
                <div class="flex justify-between items-center border-b border-green-900/30 pb-2">
                    <span class="text-[10px] font-bold text-green-500 italic">MIC ANALYSER</span>
                    <div id="mic-led" class="w-2 h-2 rounded-full bg-red-900"></div>
                </div>
                <div class="grid grid-cols-12 gap-2 h-24 mic-monitor-bg p-2 rounded overflow-hidden">
                    <canvas id="mic-waveform" class="col-span-10 w-full h-full"></canvas>
                    <div id="peak-meter" class="col-span-2 flex flex-col-reverse h-full">
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                        <div class="meter-segment"></div>
                    </div>
                </div>
                <select id="mic-select"
                    class="w-full bg-black border border-green-900 text-[9px] text-green-500 p-1 focus:outline-none"></select>
                <button id="btn-toggle-mic" class="w-full btn-cockpit py-1 text-[10px] text-green-400 font-bold">START
                    TEST</button>
                <p id="mic-db-label" class="text-[8px] font-mono text-green-800 text-center">SIGNAL: IDLE</p>
            </div>
        </div>
    </main>

    <footer id="logs" class="mt-4 cockpit-panel p-2 rounded h-16 overflow-y-auto text-[9px] font-mono text-green-900">
    </footer>

    <!-- FIREBASE MODULE SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHd60VAO__hpRlV0Ne0meDy7qRcEaAlnU",
            authDomain: "yt-90eb3.firebaseapp.com",
            projectId: "yt-90eb3",
            storageBucket: "yt-90eb3.firebasestorage.app",
            messagingSenderId: "622222071571",
            appId: "1:622222071571:web:af77604f4f45db960eece6",
            measurementId: "G-FR0VTD4BMJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        window.missions = [];
        let isMicRunning = false, audioCtx, analyser, animId, source;

        // UI Helpers
        const addLog = (m) => {
            const l = document.getElementById('logs');
            l.innerHTML = `<div>[${new Date().toLocaleTimeString()}] > ${m}</div>` + l.innerHTML;
        };

        const renderMissions = () => {
            const container = document.getElementById('idea-list');
            document.getElementById('stat-total').innerText = window.missions.length;
            container.innerHTML = window.missions.map((m, i) => `
                <div class="bg-black/60 border border-green-900/20 p-2 rounded mb-2 text-[10px]">
                    <div class="flex justify-between">
                        <span class="text-green-400 font-bold">${m.title}</span>
                        <button onclick="window.delMission(${i})" class="text-red-900 hover:text-red-500">ลบ</button>
                    </div>
                </div>
            `).join('');
        };

        // Mission Logic
        document.getElementById('btn-add-mission').onclick = () => {
            const title = document.getElementById('mission-name').value;
            const rec = document.getElementById('date-rec').value;
            if (!title) return;
            window.missions.push({ title, rec });
            document.getElementById('mission-name').value = "";
            renderMissions();
            addLog(`LOCAL: เพิ่มภารกิจ "${title}"`);
        };

        window.delMission = (i) => {
            window.missions.splice(i, 1);
            renderMissions();
        };

        // Firebase Sync
        document.getElementById('btn-save-all').onclick = async () => {
            const script = document.getElementById('main-script').value;
            try {
                addLog("CLOUD: กำลังบันทึก...");
                await setDoc(doc(db, "mission_control", "user_data"), {
                    missions: window.missions,
                    script: script,
                    updatedAt: new Date().toISOString()
                });
                addLog("CLOUD: บันทึกข้อมูลสำเร็จ");
            } catch (e) { addLog("CLOUD_ERROR: " + e.message); }
        };

        const loadCloudData = async () => {
            try {
                const snap = await getDoc(doc(db, "mission_control", "user_data"));
                if (snap.exists()) {
                    const data = snap.data();
                    window.missions = data.missions || [];
                    document.getElementById('main-script').value = data.script || "";
                    renderMissions();
                    addLog("CLOUD: โหลดข้อมูลล่าสุดแล้ว");
                }
            } catch (e) { addLog("CLOUD_ERROR: โหลดไม่สำเร็จ"); }
        };

        // Audio Engine (Fixed UI Overlap)
        document.getElementById('btn-toggle-mic').onclick = async () => {
            if (isMicRunning) {
                stopMic();
            } else {
                startMic();
            }
        };

        async function startMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { deviceId: document.getElementById('mic-select').value ? { exact: document.getElementById('mic-select').value } : undefined }
                });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                isMicRunning = true;
                document.getElementById('btn-toggle-mic').innerText = "STOP TEST";
                document.getElementById('mic-led').className = "w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_#33ff33]";
                draw();
                addLog("AUDIO: ไมค์ทำงาน");
            } catch (e) { addLog("AUDIO_ERROR: " + e.message); }
        }

        function stopMic() {
            isMicRunning = false;
            cancelAnimationFrame(animId);
            if (audioCtx) audioCtx.close();
            document.getElementById('btn-toggle-mic').innerText = "START TEST";
            document.getElementById('mic-led').className = "w-2 h-2 rounded-full bg-red-900";
            const canvas = document.getElementById('mic-waveform');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            document.querySelectorAll('.meter-segment').forEach(s => s.className = 'meter-segment');
        }

        function draw() {
            if (!isMicRunning) return;
            const canvas = document.getElementById('mic-waveform');
            const ctx = canvas.getContext('2d');
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2; ctx.strokeStyle = '#33ff33';
            ctx.beginPath();
            let x = 0, slice = canvas.width / data.length;
            for (let i = 0; i < data.length; i++) {
                let v = data[i] / 128.0, y = v * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += slice;
            }
            ctx.lineTo(canvas.width, canvas.height / 2); ctx.stroke();

            let sum = 0;
            for (let i = 0; i < data.length; i++) sum += Math.abs(data[i] - 128);
            let avg = sum / data.length;
            const segments = document.querySelectorAll('.meter-segment');
            const active = Math.min(Math.floor(avg / 4), 10);
            segments.forEach((s, i) => {
                s.className = 'meter-segment';
                if (i < active) {
                    if (i < 6) s.classList.add('meter-active-green');
                    else if (i < 9) s.classList.add('meter-active-yellow');
                    else s.classList.add('meter-active-red');
                }
            });
            animId = requestAnimationFrame(draw);
        }

        // Init
        const initMics = async () => {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const mics = devices.filter(d => d.kind === 'audioinput');
            document.getElementById('mic-select').innerHTML = mics.map(m => `<option value="${m.deviceId}">${m.label || 'Mic'}</option>`).join('');
        };

        // Tab Logic
        document.getElementById('tab-script-btn').onclick = () => {
            document.getElementById('content-script').classList.remove('hidden');
            document.getElementById('content-calendar').classList.add('hidden');
            document.getElementById('tab-script-btn').className = "px-6 py-2 tab-active";
            document.getElementById('tab-calendar-btn').className = "px-6 py-2 text-green-900";
        };
        document.getElementById('tab-calendar-btn').onclick = () => {
            document.getElementById('content-script').classList.add('hidden');
            document.getElementById('content-calendar').classList.remove('hidden');
            document.getElementById('tab-calendar-btn').className = "px-6 py-2 tab-active";
            document.getElementById('tab-script-btn').className = "px-6 py-2 text-green-900";
        };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        initMics();
        loadCloudData();
    </script>
</body>

</html>
